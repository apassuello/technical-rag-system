document_processor:
  type: "hybrid_pdf"
  config:
    chunk_size: 1024
    chunk_overlap: 128

embedder:
  type: "modular"
  config:
    model:
      type: "sentence_transformer"
      config:
        model_name: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
        device: "auto"
        normalize_embeddings: true
    batch_processor:
      type: "dynamic"
      config:
        initial_batch_size: 64
    cache:
      type: "memory"
      config:
        max_entries: 1000

retriever:
  type: "modular_unified"
  config:
    vector_index:
      type: "faiss"
      config:
        index_type: "IndexFlatIP"
        normalize_embeddings: true
    sparse:
      type: "bm25"
      config:
        k1: 1.2
        b: 0.75
        lowercase: true
        filter_stop_words: true
    fusion:
      type: "score_aware"
      config:
        score_weight: 0.6
        rank_weight: 0.3
        overlap_weight: 0.1
        k: 60
    reranker:
      type: "semantic"
      config:
        enabled: true
        model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
        top_k: 10

answer_generator:
  type: "adaptive_modular"
  config:
    llm_client:
      type: "openai"
      config:
        model_name: "qwen2.5-1.5b-instruct"
        base_url: "http://localhost:11434/v1"
        api_key: "local"
