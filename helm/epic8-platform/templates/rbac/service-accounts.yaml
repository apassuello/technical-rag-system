{{/*
Epic 8 Platform - Service Accounts Template
Kubernetes service accounts for all Epic 8 services
*/}}

{{- if .Values.rbac.create }}

{{- if .Values.rbac.serviceAccounts.apiGateway.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" "api-gateway" "context" .) }}
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.serviceLabels" (dict "service" "api-gateway" "tier" "frontend" "component" "gateway" "context" .) | nindent 4 }}
  annotations:
    {{- include "epic8-platform.annotations" . | nindent 4 }}
    epic8.platform/description: "Service account for API Gateway service"
    {{- with .Values.rbac.serviceAccounts.apiGateway.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: true
{{- end }}

