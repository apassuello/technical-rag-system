# Demo Configuration for RAG Platform
# Lightweight config optimized for interactive demo

demo:
  title: "Swiss Precision RAG Workbench"
  subtitle: "Production-Ready Technical Documentation RAG System"

  # System statistics
  stats:
    total_documents: 2538
    total_tests: 1943
    components: 6
    subcomponents: 97
    type_hint_coverage: 96.6

  # Performance baselines (from your local testing)
  performance:
    avg_query_time_ms: 352
    avg_retrieval_time_ms: 12
    avg_embedding_time_ms: 35
    avg_generation_time_ms: 305

# Document processor configuration
document_processor:
  type: "hybrid_pdf"
  config:
    chunk_size: 1024
    chunk_overlap: 128

# Embedder configuration (lightweight for demo)
embedder:
  type: "modular"
  config:
    model:
      type: "sentence_transformer"
      config:
        model_name: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
        device: "cpu"  # Use CPU for broader compatibility
        normalize_embeddings: true
    batch_processor:
      type: "dynamic"
      config:
        initial_batch_size: 32
        max_batch_size: 128
        optimize_for_memory: true
    cache:
      type: "memory"
      config:
        max_entries: 10000
        max_memory_mb: 512

# Retriever configurations for different strategies
retriever:
  type: "modular_unified"

  # Strategy presets for demo
  strategies:
    faiss_only:
      name: "FAISS Only (Dense)"
      vector_index:
        type: "faiss"
        config:
          index_type: "IndexFlatIP"
          normalize_embeddings: true
      sparse:
        type: "bm25"
        config:
          enabled: false
      fusion:
        type: "identity"  # No fusion needed for single strategy
      reranker:
        type: "identity"
        config:
          enabled: false

    bm25_only:
      name: "BM25 Only (Sparse)"
      vector_index:
        type: "faiss"
        config:
          enabled: false
      sparse:
        type: "bm25"
        config:
          k1: 1.2
          b: 0.75
          enabled: true
      fusion:
        type: "identity"
      reranker:
        type: "identity"
        config:
          enabled: false

    hybrid_rrf:
      name: "Hybrid (RRF Fusion)"
      vector_index:
        type: "faiss"
        config:
          index_type: "IndexFlatIP"
          normalize_embeddings: true
      sparse:
        type: "bm25"
        config:
          k1: 1.2
          b: 0.75
      fusion:
        type: "rrf"
        config:
          k: 60
          weights:
            dense: 0.7
            sparse: 0.3
      reranker:
        type: "identity"
        config:
          enabled: false

    hybrid_weighted:
      name: "Hybrid (Weighted Fusion)"
      vector_index:
        type: "faiss"
        config:
          index_type: "IndexFlatIP"
          normalize_embeddings: true
      sparse:
        type: "bm25"
        config:
          k1: 1.2
          b: 0.75
      fusion:
        type: "weighted"
        config:
          dense_weight: 0.7
          sparse_weight: 0.3
      reranker:
        type: "identity"
        config:
          enabled: false

    hybrid_with_reranking:
      name: "Hybrid + Semantic Reranking"
      vector_index:
        type: "faiss"
        config:
          index_type: "IndexFlatIP"
          normalize_embeddings: true
      sparse:
        type: "bm25"
        config:
          k1: 1.2
          b: 0.75
      fusion:
        type: "rrf"
        config:
          k: 60
          weights:
            dense: 0.7
            sparse: 0.3
      reranker:
        type: "semantic"
        config:
          enabled: true
          model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# Query analyzer configuration (Epic1 ML-based classification)
query_analyzer:
  type: "epic1"
  config:
    feature_extractor:
      # Linguistic feature extraction
      enable_stopword_removal: false  # Keep stopwords for context
      extract_entities: true
      extract_technical_terms: true

    complexity_classifier:
      # Thresholds for complexity classification
      simple_threshold: 0.3   # Below this = simple
      complex_threshold: 0.7  # Above this = complex

      # Feature weights for classification
      weights:
        vocabulary_complexity: 0.3
        syntactic_complexity: 0.3
        semantic_ambiguity: 0.2
        domain_specificity: 0.2

    model_recommender:
      # Routing strategy: "balanced", "cost_optimized", "latency_optimized", "quality_optimized"
      strategy: "balanced"

      # Model mappings for complexity levels
      model_mappings:
        simple:
          model: "qwen2.5-1.5b-instruct"
          provider: "openai"
          model_name: "qwen2.5-1.5b-instruct"
        medium:
          model: "qwen2.5-1.5b-instruct"
          provider: "openai"
          model_name: "qwen2.5-1.5b-instruct"
        complex:
          model: "qwen2.5-1.5b-instruct"
          provider: "openai"
          model_name: "qwen2.5-1.5b-instruct"

# Answer generator configuration (modular with Epic1 integration)
answer_generator:
  type: "answer_generator"  # Use modular answer generator
  config:
    prompt_builder:
      type: "simple"
      config:
        max_context_length: 4000
        include_instructions: true
        citation_style: "inline"

    llm_client:
      type: "openai"
      config:
        model_name: "qwen2.5-1.5b-instruct"  # Default model (overridden by Epic1)
        api_key: "local"
        base_url: "http://localhost:11434/v1"
        timeout: 120
        temperature: 0.7
        max_tokens: 512

    response_parser:
      type: "markdown"
      config:
        extract_citations: true
        preserve_formatting: true

    confidence_scorer:
      type: "semantic"
      config:
        relevance_weight: 0.4
        grounding_weight: 0.4
        quality_weight: 0.2

# Demo-specific settings
demo_settings:
  # Query interface defaults
  default_top_k: 10
  max_top_k: 20
  default_strategy: "hybrid_rrf"

  # Display settings
  show_scores: true
  show_metadata: true
  show_performance_metrics: true

  # Comparison settings
  comparison_strategies:
    - "faiss_only"
    - "bm25_only"
    - "hybrid_rrf"
    - "hybrid_weighted"

  # Sample queries for quick testing
  sample_queries:
    - "What is RISC-V?"
    - "Explain machine learning algorithms"
    - "How do neural networks work?"
    - "What are embedded systems?"
    - "Describe transformer architecture"

  # Fusion laboratory presets
  fusion_presets:
    rrf:
      k: [30, 60, 100]
      default: 60
    weighted:
      dense_weight: [0.5, 0.6, 0.7, 0.8]
      sparse_weight: [0.5, 0.4, 0.3, 0.2]
      default_dense: 0.7
      default_sparse: 0.3

# Paths (relative to demo directory)
paths:
  indices_dir: "../data/indices"
  documents_file: "../data/indices/documents.pkl"
  faiss_index_file: "../data/indices/faiss_index.bin"
  metadata_file: "../data/indices/index_metadata.json"
