# Retriever Service Configuration

# Service Configuration
service:
  name: "retriever-service"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8083
  debug: false

# Epic 2 ModularUnifiedRetriever Configuration
retriever_config:
  # Vector Index Configuration
  vector_index:
    type: "faiss"
    config:
      index_type: "IndexFlatIP"  # Inner product for cosine similarity
      normalize_embeddings: true
      dimension: 384  # sentence-transformers/all-MiniLM-L6-v2 dimension
      metric_type: "METRIC_INNER_PRODUCT"

  # Sparse Retriever Configuration (BM25)
  sparse:
    type: "bm25"
    config:
      k1: 1.2
      b: 0.75
      epsilon: 0.25
      delta: 0.5

  # Fusion Strategy Configuration
  fusion:
    type: "rrf"  # Reciprocal Rank Fusion
    config:
      k: 60  # RRF parameter
      weights:
        dense: 0.7
        sparse: 0.3
      normalize_scores: true

  # Reranker Configuration
  reranker:
    type: "semantic"
    config:
      enabled: true
      model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
      max_candidates: 20
      device: "cpu"  # Use "mps" for Apple Silicon, "cuda" for NVIDIA GPUs

  # Composite Filtering (Advanced quality control)
  composite_filtering:
    enabled: true
    fusion_weight: 0.7
    semantic_weight: 0.3
    min_composite_score: 0.4
    max_candidates: 15

# Embedder Configuration (for ModularUnifiedRetriever)
embedder_config:
  type: "sentence_transformer"
  config:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    device: "cpu"  # Use "mps" for Apple Silicon
    batch_size: 32
    normalize_embeddings: true
    cache_folder: "/tmp/sentence_transformers"

# Performance and Reliability Configuration
performance:
  # Circuit Breaker Configuration
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout: 60
    expected_exception: "Exception"

  # Timeout Configuration
  timeouts:
    retrieval_timeout: 30.0  # seconds
    indexing_timeout: 300.0  # 5 minutes for large indexing operations
    health_check_timeout: 5.0

  # Batch Processing Configuration
  batch:
    max_batch_size: 100
    batch_timeout: 5.0  # seconds

# Monitoring and Metrics
monitoring:
  metrics:
    enabled: true
    prefix: "retriever"
    
  health_checks:
    enabled: true
    interval: 30  # seconds
    
  logging:
    level: "INFO"
    format: "structured"
    include_performance_metrics: true

# Development and Testing
development:
  mock_responses: false
  test_data_path: "/tmp/test_documents"
  performance_profiling: false