[tool:pytest]
# Pytest configuration for Query Analyzer Service

# Test discovery
testpaths = .
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Output and reporting
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10
    --disable-warnings
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for service functionality  
    api: API endpoint tests
    performance: Performance and load testing
    slow: Slow running tests
    epic1: Tests requiring Epic1QueryAnalyzer
    asyncio: Async tests

# Test timeout
timeout = 300

# Async support
asyncio_mode = auto

# Filtering
filterwarnings = 
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*pkg_resources.*:ImportWarning

# Minimum version
minversion = 6.0