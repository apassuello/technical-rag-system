# Generator Service Configuration
service_name: "generator"
service_version: "1.0.0"

# Server Configuration
host: "0.0.0.0"
port: 8081
workers: 1

# gRPC Configuration (for Phase 1.3)
grpc_port: 50052
grpc_max_workers: 10

# Logging Configuration
log_level: "INFO"
log_format: "json"

# Metrics Configuration
enable_metrics: true
metrics_path: "/metrics"

# Performance Configuration
request_timeout: 120
max_concurrent_requests: 50

# Health Check Configuration
health_check_interval: 30

# Generator Configuration - Maps to Epic1AnswerGenerator config
generator:
  # Multi-Model Routing Configuration
  routing:
    enabled: true
    default_strategy: "balanced"
    enable_availability_testing: false
    availability_check_mode: "startup"
    fallback_on_failure: true
    strategies:
      cost_optimized:
        model_preferences:
          - "ollama/llama3.2:3b"
          - "openai/gpt-3.5-turbo"
          - "mistral/mistral-small"
        cost_weights:
          "ollama/llama3.2:3b": 0.0
          "openai/gpt-3.5-turbo": 0.002
          "mistral/mistral-small": 0.001
        max_cost_per_query: 0.01
      balanced:
        model_preferences:
          - "openai/gpt-3.5-turbo"
          - "mistral/mistral-medium"
          - "ollama/llama3.2:3b"
        cost_weights:
          "openai/gpt-3.5-turbo": 0.002
          "mistral/mistral-medium": 0.004
          "ollama/llama3.2:3b": 0.0
        max_cost_per_query: 0.05
      quality_first:
        model_preferences:
          - "openai/gpt-4"
          - "mistral/mistral-large"
          - "openai/gpt-3.5-turbo"
        cost_weights:
          "openai/gpt-4": 0.06
          "mistral/mistral-large": 0.008
          "openai/gpt-3.5-turbo": 0.002
        max_cost_per_query: 0.1

  # Fallback Configuration
  fallback:
    enabled: true
    fallback_model: "ollama/llama3.2:3b"
    max_retries: 3
    retry_delay: 1.0
    fallback_on_error: true
    fallback_on_timeout: true

  # Cost Tracking Configuration
  cost_tracking:
    enabled: true
    precision_places: 6
    daily_budget_limit: 100.0
    per_user_budget_limit: 10.0
    alert_threshold: 0.8

  # LLM Adapter Configuration
  adapters:
    ollama:
      endpoint: "http://localhost:11434"
      timeout: 30
      max_retries: 3
      models:
        "llama3.2:3b":
          max_tokens: 2048
          temperature: 0.7
          top_p: 0.9
    openai:
      api_key_env: "OPENAI_API_KEY"
      timeout: 60
      max_retries: 3
      models:
        "gpt-3.5-turbo":
          max_tokens: 2048
          temperature: 0.7
        "gpt-4":
          max_tokens: 4096
          temperature: 0.3
    mistral:
      api_key_env: "MISTRAL_API_KEY"
      timeout: 60
      max_retries: 3
      models:
        "mistral-small":
          max_tokens: 2048
          temperature: 0.7
        "mistral-medium":
          max_tokens: 2048
          temperature: 0.7
        "mistral-large":
          max_tokens: 4096
          temperature: 0.3