name: Epic 8 Kubernetes Testing Pipeline
# Comprehensive K8s testing pipeline for Epic 8 Cloud-Native RAG Platform
# Following test-driven development principles for infrastructure as code

on:
  push:
    branches: [ main, develop, epic8* ]
    paths:
      - 'k8s/**'
      - 'helm/**'
      - 'services/**'
      - 'docker-compose.yml'
      - '.github/workflows/k8s-testing.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'k8s/**'
      - 'helm/**'
      - 'services/**'
      - 'docker-compose.yml'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level to run'
        required: true
        default: 'full'
        type: choice
        options:
          - 'validation'
          - 'deployment'
          - 'full'
          - 'performance'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CLUSTER_NAME: epic8-ci-testing
  NAMESPACE: epic8

jobs:
  # Job 1: Static Analysis and Validation
  static-validation:
    name: 🔍 Static Analysis & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml pytest kubernetes

    - name: Validate YAML syntax
      run: |
        echo "🔍 Validating YAML syntax..."
        find k8s/ helm/ -name "*.yaml" -o -name "*.yml" | xargs -I {} python -c "
        import yaml, sys
        try:
            with open('{}', 'r') as f:
                yaml.safe_load_all(f.read())
            print('✅ {}')
        except Exception as e:
            print('❌ {}: {}'.format('{}', e))
            sys.exit(1)
        "

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Validate Kubernetes manifests
      run: |
        echo "🔍 Validating Kubernetes manifests..."
        if [ -d "k8s/manifests" ]; then
          for manifest in k8s/manifests/*.yaml; do
            if [ -f "$manifest" ]; then
              echo "Validating $manifest..."
              kubectl apply --dry-run=client --validate=true -f "$manifest" || exit 1
            fi
          done
        else
          echo "⚠️ No k8s/manifests directory found"
        fi

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Validate Helm charts
      run: |
        echo "🔍 Validating Helm charts..."
        if [ -d "helm/charts" ]; then
          for chart in helm/charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting chart: $chart"
              helm lint "$chart" || exit 1
            fi
          done
        else
          echo "⚠️ No helm/charts directory found"
        fi

    - name: Run K8s manifest validation tests
      run: |
        echo "🧪 Running K8s manifest validation tests..."
        if [ -f "k8s/tests/test_manifest_validation.py" ]; then
          cd k8s/tests
          python -m pytest test_manifest_validation.py -v --tb=short
        else
          echo "⚠️ K8s validation tests not found"
        fi

    - name: Run Helm chart validation tests
      run: |
        echo "🧪 Running Helm chart validation tests..."
        if [ -f "helm/tests/test_helm_charts.py" ]; then
          cd helm/tests
          python -m pytest test_helm_charts.py -v --tb=short
        else
          echo "⚠️ Helm validation tests not found"
        fi

  # Job 2: Build and Test Container Images
  build-images:
    name: 🐳 Build & Test Images
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 30
    if: github.event.inputs.test_level != 'validation'

    strategy:
      matrix:
        service: [api-gateway, query-analyzer, generator, retriever, cache, analytics]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/epic8-${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/${{ matrix.service }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test image
      run: |
        echo "🧪 Testing ${{ matrix.service }} image..."
        docker run --rm --name test-${{ matrix.service }} \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/epic8-${{ matrix.service }}:sha-${{ github.sha }} \
          --version || echo "No --version flag available"

  # Job 3: Local Kubernetes Testing
  local-k8s-testing:
    name: 🎯 Local K8s Testing
    runs-on: ubuntu-latest
    needs: [static-validation, build-images]
    timeout-minutes: 45
    if: github.event.inputs.test_level != 'validation'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml pytest kubernetes requests

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Create Kind cluster
      uses: helm/kind-action@v1.8.0
      with:
        cluster_name: ${{ env.CLUSTER_NAME }}
        version: v0.20.0
        kubectl_version: v1.28.0
        config: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          name: ${{ env.CLUSTER_NAME }}
          nodes:
          - role: control-plane
            kubeadmConfigPatches:
            - |
              kind: InitConfiguration
              nodeRegistration:
                kubeletExtraArgs:
                  node-labels: "ingress-ready=true"
            extraPortMappings:
            - containerPort: 8080
              hostPort: 8080
              protocol: TCP
            - containerPort: 8081
              hostPort: 8081
              protocol: TCP
            - containerPort: 8082
              hostPort: 8082
              protocol: TCP
            - containerPort: 8083
              hostPort: 8083
              protocol: TCP
            - containerPort: 8084
              hostPort: 8084
              protocol: TCP
            - containerPort: 8085
              hostPort: 8085
              protocol: TCP
          - role: worker
          - role: worker

    - name: Wait for cluster ready
      run: |
        echo "⏳ Waiting for cluster to be ready..."
        kubectl wait --for=condition=Ready nodes --all --timeout=300s
        kubectl cluster-info

    - name: Install NGINX Ingress Controller
      run: |
        echo "🔗 Installing NGINX Ingress Controller..."
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
        kubectl wait --namespace ingress-nginx \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=300s

    - name: Create Epic 8 namespace
      run: |
        echo "📦 Creating Epic 8 namespace..."
        kubectl create namespace ${{ env.NAMESPACE }}
        kubectl label namespace ${{ env.NAMESPACE }} app.kubernetes.io/part-of=epic8-rag-platform

    - name: Load Docker images to Kind
      run: |
        echo "📥 Loading Docker images to Kind cluster..."
        for service in api-gateway query-analyzer generator retriever cache analytics; do
          echo "Loading epic8-$service image..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/epic8-$service:sha-${{ github.sha }} || echo "Image not found, skipping..."
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/epic8-$service:sha-${{ github.sha }} \
            --name ${{ env.CLUSTER_NAME }} || echo "Failed to load image, continuing..."
        done

    - name: Deploy Epic 8 services
      run: |
        echo "🚀 Deploying Epic 8 services..."

        # Check if we have K8s manifests or Helm charts
        if [ -d "k8s/manifests" ] && [ "$(ls -A k8s/manifests/*.yaml 2>/dev/null)" ]; then
          echo "Deploying using K8s manifests..."
          kubectl apply -f k8s/manifests/ -n ${{ env.NAMESPACE }}
        elif [ -d "helm/charts" ] && [ "$(ls -A helm/charts/*/Chart.yaml 2>/dev/null)" ]; then
          echo "Deploying using Helm charts..."
          for chart in helm/charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              chart_name=$(basename "$chart")
              echo "Deploying chart: $chart_name"
              helm upgrade --install $chart_name "$chart" \
                --namespace ${{ env.NAMESPACE }} \
                --set image.tag=sha-${{ github.sha }} \
                --timeout=10m
            fi
          done
        else
          echo "⚠️ No K8s manifests or Helm charts found, creating basic deployment..."
          # Create a basic deployment for testing
          cat <<EOF | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: epic8-test-deployment
          namespace: ${{ env.NAMESPACE }}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: epic8-test
          template:
            metadata:
              labels:
                app: epic8-test
            spec:
              containers:
              - name: test
                image: nginx:alpine
                ports:
                - containerPort: 80
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: epic8-test-service
          namespace: ${{ env.NAMESPACE }}
        spec:
          selector:
            app: epic8-test
          ports:
          - port: 80
            targetPort: 80
        EOF
        fi

    - name: Wait for deployments
      run: |
        echo "⏳ Waiting for deployments to be ready..."
        # Wait for all deployments to be ready
        kubectl wait --for=condition=available --timeout=600s \
          deployment --all -n ${{ env.NAMESPACE }} || echo "Some deployments may not be ready"

        # Show status
        echo "📊 Deployment status:"
        kubectl get all -n ${{ env.NAMESPACE }}

    - name: Run deployment validation tests
      run: |
        echo "🧪 Running deployment validation tests..."
        if [ -f "scripts/k8s-testing/deployment-validation.py" ]; then
          python scripts/k8s-testing/deployment-validation.py \
            --namespace ${{ env.NAMESPACE }} \
            --output-format json \
            --timeout 300 > validation-results.json

          # Show results
          cat validation-results.json

          # Check if validation passed
          passed=$(jq '.summary.errors' validation-results.json)
          if [ "$passed" -eq 0 ]; then
            echo "✅ All validation tests passed"
          else
            echo "❌ Some validation tests failed"
            exit 1
          fi
        else
          echo "⚠️ Deployment validation script not found"
        fi

    - name: Test service connectivity
      run: |
        echo "🔗 Testing service connectivity..."

        # Get all services
        services=$(kubectl get services -n ${{ env.NAMESPACE }} -o jsonpath='{.items[*].metadata.name}')

        for service in $services; do
          echo "Testing service: $service"

          # Try to connect to the service
          kubectl run connectivity-test-$service \
            --image=curlimages/curl --rm -i --restart=Never \
            -n ${{ env.NAMESPACE }} \
            --timeout=60s \
            -- curl -s -f -m 10 "http://$service" || echo "Service $service not responding"
        done

    - name: Collect logs on failure
      if: failure()
      run: |
        echo "📋 Collecting logs for debugging..."

        echo "=== Cluster Info ==="
        kubectl cluster-info

        echo "=== Nodes ==="
        kubectl get nodes -o wide

        echo "=== Pods ==="
        kubectl get pods -n ${{ env.NAMESPACE }} -o wide

        echo "=== Events ==="
        kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp'

        echo "=== Pod Logs ==="
        for pod in $(kubectl get pods -n ${{ env.NAMESPACE }} -o jsonpath='{.items[*].metadata.name}'); do
          echo "--- Logs for $pod ---"
          kubectl logs $pod -n ${{ env.NAMESPACE }} --tail=50 || echo "No logs available"
        done

    - name: Upload validation results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: validation-results-${{ github.sha }}
        path: |
          validation-results.json
          *.log

  # Job 4: Performance Testing (optional)
  performance-testing:
    name: 🚀 Performance Testing
    runs-on: ubuntu-latest
    needs: local-k8s-testing
    timeout-minutes: 30
    if: github.event.inputs.test_level == 'performance' || github.event.inputs.test_level == 'full'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        # Install performance testing tools
        sudo apt-get update
        sudo apt-get install -y apache2-utils

        # Install hey (HTTP load testing tool)
        wget https://hey-release.s3.us-east-2.amazonaws.com/hey_linux_amd64
        chmod +x hey_linux_amd64
        sudo mv hey_linux_amd64 /usr/local/bin/hey

    - name: Create Kind cluster
      uses: helm/kind-action@v1.8.0
      with:
        cluster_name: perf-testing
        version: v0.20.0

    - name: Deploy for performance testing
      run: |
        echo "🚀 Setting up performance testing environment..."

        # Create namespace
        kubectl create namespace performance-test

        # Deploy a simple test service
        cat <<EOF | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: perf-test-service
          namespace: performance-test
        spec:
          replicas: 3
          selector:
            matchLabels:
              app: perf-test
          template:
            metadata:
              labels:
                app: perf-test
            spec:
              containers:
              - name: nginx
                image: nginx:alpine
                ports:
                - containerPort: 80
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "128Mi"
                    cpu: "100m"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: perf-test-service
          namespace: performance-test
        spec:
          selector:
            app: perf-test
          ports:
          - port: 80
            targetPort: 80
          type: ClusterIP
        EOF

        # Wait for deployment
        kubectl wait --for=condition=available --timeout=300s \
          deployment/perf-test-service -n performance-test

    - name: Run performance tests
      run: |
        echo "🧪 Running performance tests..."

        # Port forward to the service
        kubectl port-forward svc/perf-test-service 8080:80 -n performance-test &
        PF_PID=$!

        # Wait for port forward to be ready
        sleep 5

        # Run load test
        echo "Running load test with hey..."
        hey -n 1000 -c 10 -t 30 http://localhost:8080/ > performance-results.txt

        # Show results
        cat performance-results.txt

        # Stop port forward
        kill $PF_PID || true

        # Extract key metrics
        echo "=== Performance Summary ==="
        grep -E "(Total:|Requests/sec:|Average:|95%)" performance-results.txt || echo "Could not extract metrics"

    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results-${{ github.sha }}
        path: performance-results.txt

  # Job 5: Multi-Environment Testing
  multi-environment-testing:
    name: 🌍 Multi-Environment Testing
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 20
    if: github.event.inputs.test_level == 'full'

    strategy:
      matrix:
        environment: [development, staging, production]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml pytest

    - name: Test Helm chart rendering for ${{ matrix.environment }}
      run: |
        echo "🧪 Testing Helm chart rendering for ${{ matrix.environment }}..."

        if [ -d "helm/charts" ]; then
          for chart in helm/charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              chart_name=$(basename "$chart")
              echo "Testing chart $chart_name for ${{ matrix.environment }}..."

              # Check if environment-specific values exist
              if [ -f "$chart/values-${{ matrix.environment }}.yaml" ]; then
                echo "Using environment-specific values..."
                helm template test-release "$chart" \
                  -f "$chart/values-${{ matrix.environment }}.yaml" > /dev/null
                echo "✅ Chart $chart_name renders correctly for ${{ matrix.environment }}"
              else
                echo "Using default values..."
                helm template test-release "$chart" > /dev/null
                echo "✅ Chart $chart_name renders correctly with default values"
              fi
            fi
          done
        else
          echo "⚠️ No Helm charts found"
        fi

  # Job 6: Security Scanning
  security-scanning:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Scan Kubernetes manifests with Trivy
      run: |
        echo "🔍 Scanning Kubernetes manifests for security issues..."
        if [ -d "k8s/manifests" ]; then
          trivy config k8s/manifests/ --format table
        fi

        if [ -d "helm/charts" ]; then
          trivy config helm/charts/ --format table
        fi

  # Final job: Deployment Summary
  deployment-summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [static-validation, build-images, local-k8s-testing]
    if: always()

    steps:
    - name: Generate deployment summary
      run: |
        echo "# Epic 8 Kubernetes Testing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Test Level**: ${{ github.event.inputs.test_level || 'full' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Job Status" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Static Validation | ${{ needs.static-validation.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build Images | ${{ needs.build-images.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Local K8s Testing | ${{ needs.local-k8s-testing.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ needs.local-k8s-testing.result }}" = "success" ]; then
          echo "✅ **All tests passed!** Epic 8 is ready for deployment." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Some tests failed.** Please review the results above." >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "- Review test results and artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Fix any failing tests" >> $GITHUB_STEP_SUMMARY
        echo "- Deploy to staging environment" >> $GITHUB_STEP_SUMMARY
        echo "- Run integration tests" >> $GITHUB_STEP_SUMMARY