{{/*
Epic 8 Platform - Retriever Deployment Template
High-performance vector search and document retrieval service
*/}}

{{- if .Values.retriever.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" "retriever" "context" .) }}
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.serviceLabels" (dict "service" "retriever" "tier" "backend" "component" "retriever" "context" .) | nindent 4 }}
  annotations:
    {{- include "epic8-platform.annotations" . | nindent 4 }}
    epic8.platform/description: "Retriever - High-performance vector search and document retrieval"
spec:
  replicas: {{ .Values.retriever.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "epic8-platform.serviceSelectorLabels" (dict "service" "retriever" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "epic8-platform.serviceLabels" (dict "service" "retriever" "tier" "backend" "component" "retriever" "context" .) | nindent 8 }}
      annotations:
        {{- include "epic8-platform.annotations" . | nindent 8 }}
        {{- if include "epic8-platform.monitoring.enabled" . }}
        {{- include "epic8-platform.prometheusAnnotations" (dict "port" "9090" "path" "/metrics") | nindent 8 }}
        {{- end }}
        {{- include "epic8-platform.serviceMeshAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "epic8-platform.serviceName" (dict "service" "retriever" "context" .) }}
      securityContext:
        {{- include "epic8-platform.podSecurityContext" . | nindent 8 }}
      containers:
      - name: retriever
        image: {{ include "epic8-platform.image" (dict "repository" .Values.retriever.image.repository "tag" (.Values.retriever.image.tag | default .Chart.AppVersion) "global" .Values.global) }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.retriever.service.targetPort }}
          protocol: TCP
        {{- if include "epic8-platform.monitoring.enabled" . }}
        - name: metrics
          containerPort: {{ .Values.retriever.service.metricsPort }}
          protocol: TCP
        {{- end }}
        env:
        {{- include "epic8-platform.commonEnvVars" . | nindent 8 }}
        - name: VECTOR_DIMENSION
          value: {{ .Values.retriever.vectorIndex.faiss.dimension | quote }}
        - name: INDEX_TYPE
          value: {{ .Values.retriever.vectorIndex.faiss.index_type | quote }}
        - name: BM25_K1
          value: {{ .Values.retriever.bm25.k1 | quote }}
        - name: BM25_B
          value: {{ .Values.retriever.bm25.b | quote }}
        envFrom:
        {{- if .Values.configMaps.common.create }}
        - configMapRef:
            name: {{ include "epic8-platform.fullname" . }}-common-config
        {{- end }}
        {{- if .Values.secrets.platform.create }}
        - secretRef:
            name: {{ include "epic8-platform.fullname" . }}-secrets
        {{- end }}
        resources:
          {{- include "epic8-platform.resources" (dict "service" .Values.retriever "global" .Values.global "context" .) | nindent 10 }}
        securityContext:
          {{- include "epic8-platform.containerSecurityContext" . | nindent 10 }}
        livenessProbe:
          {{- include "epic8-platform.httpProbe" (dict "path" .Values.retriever.health.liveness.path "port" "http" "config" .Values.retriever.health.liveness) | nindent 10 }}
        readinessProbe:
          {{- include "epic8-platform.httpProbe" (dict "path" .Values.retriever.health.readiness.path "port" "http" "config" .Values.retriever.health.readiness) | nindent 10 }}
        startupProbe:
          {{- include "epic8-platform.httpProbe" (dict "path" .Values.retriever.health.startup.path "port" "http" "config" .Values.retriever.health.startup) | nindent 10 }}
        volumeMounts:
        {{- include "epic8-platform.standardVolumeMounts" . | nindent 8 }}
        {{- if .Values.retriever.vectorIndex.persistence.enabled }}
        - name: vector-data
          mountPath: /app/data
        {{- end }}
      volumes:
      {{- include "epic8-platform.standardVolumes" . | nindent 6 }}
      {{- if .Values.retriever.vectorIndex.persistence.enabled }}
      - name: vector-data
        persistentVolumeClaim:
          claimName: {{ include "epic8-platform.serviceName" (dict "service" "retriever" "context" .) }}-data
      {{- end }}
      {{- if .Values.retriever.affinity.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          {{- include "epic8-platform.podAntiAffinity" (dict "service" "retriever" "weight" 100 "required" false) | nindent 10 }}
      {{- end }}
      {{- if .Values.retriever.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
      {{- include "epic8-platform.topologySpreadConstraints" (dict "service" "retriever" "maxSkew" 1) | nindent 6 }}
      {{- end }}

{{- if .Values.retriever.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" "retriever" "context" .) }}-pdb
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.serviceLabels" (dict "service" "retriever" "tier" "backend" "component" "retriever" "context" .) | nindent 4 }}
spec:
  minAvailable: {{ .Values.retriever.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "epic8-platform.serviceSelectorLabels" (dict "service" "retriever" "context" .) | nindent 6 }}
{{- end }}
{{- end }}