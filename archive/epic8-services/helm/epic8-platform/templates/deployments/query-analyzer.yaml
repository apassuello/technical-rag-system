{{/*
Epic 8 Platform - Query Analyzer Deployment Template
ML-powered query complexity analysis service
*/}}

{{- if .Values.queryAnalyzer.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" "query-analyzer" "context" .) }}
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.serviceLabels" (dict "service" "query-analyzer" "tier" "backend" "component" "analyzer" "context" .) | nindent 4 }}
  annotations:
    {{- include "epic8-platform.annotations" . | nindent 4 }}
    epic8.platform/description: "Query Analyzer - ML-based query complexity classification"
spec:
  replicas: {{ .Values.queryAnalyzer.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "epic8-platform.serviceSelectorLabels" (dict "service" "query-analyzer" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "epic8-platform.serviceLabels" (dict "service" "query-analyzer" "tier" "backend" "component" "analyzer" "context" .) | nindent 8 }}
      annotations:
        {{- include "epic8-platform.annotations" . | nindent 8 }}
        {{- if include "epic8-platform.monitoring.enabled" . }}
        {{- include "epic8-platform.prometheusAnnotations" (dict "port" "9090" "path" "/metrics") | nindent 8 }}
        {{- end }}
        {{- include "epic8-platform.serviceMeshAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "epic8-platform.serviceName" (dict "service" "query-analyzer" "context" .) }}
      securityContext:
        {{- include "epic8-platform.podSecurityContext" . | nindent 8 }}
      containers:
      - name: query-analyzer
        image: {{ include "epic8-platform.image" (dict "repository" .Values.queryAnalyzer.image.repository "tag" (.Values.queryAnalyzer.image.tag | default .Chart.AppVersion) "global" .Values.global) }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.queryAnalyzer.service.targetPort }}
          protocol: TCP
        {{- if include "epic8-platform.monitoring.enabled" . }}
        - name: metrics
          containerPort: {{ .Values.queryAnalyzer.service.metricsPort }}
          protocol: TCP
        {{- end }}
        env:
        {{- include "epic8-platform.commonEnvVars" . | nindent 8 }}
        - name: MODEL_ACCURACY_THRESHOLD
          value: {{ .Values.queryAnalyzer.model.complexity_classifier.accuracy_threshold | quote }}
        - name: MAX_FEATURES
          value: {{ .Values.queryAnalyzer.model.feature_extractor.max_features | quote }}
        envFrom:
        {{- if .Values.configMaps.common.create }}
        - configMapRef:
            name: {{ include "epic8-platform.fullname" . }}-common-config
        {{- end }}
        {{- if .Values.secrets.platform.create }}
        - secretRef:
            name: {{ include "epic8-platform.fullname" . }}-secrets
        {{- end }}
        resources:
          {{- include "epic8-platform.resources" (dict "service" .Values.queryAnalyzer "global" .Values.global "context" .) | nindent 10 }}
        securityContext:
          {{- include "epic8-platform.containerSecurityContext" . | nindent 10 }}
        livenessProbe:
          {{- include "epic8-platform.httpProbe" (dict "path" .Values.queryAnalyzer.health.liveness.path "port" "http" "config" .Values.queryAnalyzer.health.liveness) | nindent 10 }}
        readinessProbe:
          {{- include "epic8-platform.httpProbe" (dict "path" .Values.queryAnalyzer.health.readiness.path "port" "http" "config" .Values.queryAnalyzer.health.readiness) | nindent 10 }}
        startupProbe:
          {{- include "epic8-platform.httpProbe" (dict "path" .Values.queryAnalyzer.health.startup.path "port" "http" "config" .Values.queryAnalyzer.health.startup) | nindent 10 }}
        volumeMounts:
        {{- include "epic8-platform.standardVolumeMounts" . | nindent 8 }}
      volumes:
      {{- include "epic8-platform.standardVolumes" . | nindent 6 }}
      {{- if .Values.queryAnalyzer.affinity.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          {{- include "epic8-platform.podAntiAffinity" (dict "service" "query-analyzer" "weight" 100 "required" false) | nindent 10 }}
      {{- end }}
      {{- if .Values.queryAnalyzer.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
      {{- include "epic8-platform.topologySpreadConstraints" (dict "service" "query-analyzer" "maxSkew" 1) | nindent 6 }}
      {{- end }}

{{- if .Values.queryAnalyzer.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" "query-analyzer" "context" .) }}-pdb
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.serviceLabels" (dict "service" "query-analyzer" "tier" "backend" "component" "analyzer" "context" .) | nindent 4 }}
spec:
  minAvailable: {{ .Values.queryAnalyzer.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "epic8-platform.serviceSelectorLabels" (dict "service" "query-analyzer" "context" .) | nindent 6 }}
{{- end }}
{{- end }}