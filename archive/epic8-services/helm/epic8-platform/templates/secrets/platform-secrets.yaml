{{/*
Epic 8 Platform - Platform Secrets Template
Secure credential management for Epic 8 services
*/}}

{{- if .Values.secrets.platform.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "epic8-platform.fullname" . }}-secrets
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.labels" . | nindent 4 }}
    epic8.platform/component: secret
    epic8.platform/secret-type: platform
  annotations:
    {{- include "epic8-platform.annotations" . | nindent 4 }}
    epic8.platform/description: "Platform secrets for Epic 8 services"
    epic8.platform/secret-version: {{ .Chart.Version | quote }}
type: Opaque
data:
  {{- with .Values.secrets.platform.data }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
  {{- end }}

  # Placeholder secrets - Replace with actual values or use external secret management
  {{- if not .Values.secrets.platform.data }}
  # API Keys (Base64 encoded placeholders)
  openai-api-key: {{ "your-openai-api-key" | b64enc }}
  anthropic-api-key: {{ "your-anthropic-api-key" | b64enc }}
  mistral-api-key: {{ "your-mistral-api-key" | b64enc }}

  # Database credentials
  postgres-password: {{ "your-postgres-password" | b64enc }}
  postgres-user: {{ "epic8_user" | b64enc }}
  postgres-db: {{ "epic8_analytics" | b64enc }}

  # Redis credentials
  redis-password: {{ "your-redis-password" | b64enc }}

  # JWT secrets
  jwt-secret: {{ "your-jwt-secret-key" | b64enc }}
  jwt-refresh-secret: {{ "your-jwt-refresh-secret-key" | b64enc }}

  # Encryption keys
  encryption-key: {{ "your-encryption-key" | b64enc }}
  signing-key: {{ "your-signing-key" | b64enc }}

  # External service credentials
  aws-access-key-id: {{ "your-aws-access-key-id" | b64enc }}
  aws-secret-access-key: {{ "your-aws-secret-access-key" | b64enc }}
  gcp-service-account-key: {{ "your-gcp-service-account-json" | b64enc }}
  azure-client-secret: {{ "your-azure-client-secret" | b64enc }}

  # Monitoring and observability
  prometheus-auth-token: {{ "your-prometheus-auth-token" | b64enc }}
  grafana-admin-password: {{ "your-grafana-admin-password" | b64enc }}
  jaeger-auth-token: {{ "your-jaeger-auth-token" | b64enc }}
  {{- end }}
{{- end }}

{{/*
WARNING: This template contains placeholder secrets for development purposes.
For production deployments:

1. Use external secret management systems like:
   - AWS Secrets Manager
   - Azure Key Vault
   - Google Secret Manager
   - HashiCorp Vault
   - Kubernetes External Secrets Operator

2. Or provide actual base64-encoded values in values.yaml:
   secrets:
     platform:
       data:
         openai-api-key: "base64-encoded-key"
         postgres-password: "base64-encoded-password"

3. Enable external secrets in production values:
   externalSecrets:
     enabled: true
     provider: aws-secrets-manager

Swiss Engineering Standards:
- Never commit real secrets to version control
- Use principle of least privilege for secret access
- Rotate secrets regularly
- Monitor secret usage and access patterns
- Implement secret scanning in CI/CD pipelines
*/}}