{{/*
Epic 8 Platform - RBAC Role Bindings Template
Role binding definitions for Epic 8 platform services
*/}}

{{- if .Values.rbac.create }}

{{/*
Custom Role Bindings from values
*/}}
{{- range .Values.rbac.roleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .name }}
  namespace: {{ include "epic8-platform.namespace" $ }}
  labels:
    {{- include "epic8-platform.labels" $ | nindent 4 }}
    epic8.platform/component: rbac
    epic8.platform/rbac-type: role-binding
  annotations:
    {{- include "epic8-platform.annotations" $ | nindent 4 }}
    epic8.platform/description: {{ .description | default "Custom role binding for Epic 8 platform" | quote }}
subjects:
{{- range .subjects }}
- kind: {{ .kind }}
  name: {{ .name }}
  {{- if .namespace }}
  namespace: {{ .namespace }}
  {{- end }}
  {{- if .apiGroup }}
  apiGroup: {{ .apiGroup }}
  {{- end }}
{{- end }}
roleRef:
  kind: {{ .roleRef.kind }}
  name: {{ .roleRef.name }}
  apiGroup: {{ .roleRef.apiGroup }}
{{- end }}

{{/*
Custom Cluster Role Bindings from values
*/}}
{{- range .Values.rbac.clusterRoleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "epic8-platform.fullname" $ }}-{{ .name }}
  labels:
    {{- include "epic8-platform.labels" $ | nindent 4 }}
    epic8.platform/component: rbac
    epic8.platform/rbac-type: cluster-role-binding
  annotations:
    {{- include "epic8-platform.annotations" $ | nindent 4 }}
    epic8.platform/description: {{ .description | default "Custom cluster role binding for Epic 8 platform" | quote }}
subjects:
{{- range .subjects }}
- kind: {{ .kind }}
  name: {{ .name }}
  {{- if .namespace }}
  namespace: {{ .namespace }}
  {{- else }}
  namespace: {{ include "epic8-platform.namespace" $ }}
  {{- end }}
  {{- if .apiGroup }}
  apiGroup: {{ .apiGroup }}
  {{- end }}
{{- end }}
roleRef:
  kind: {{ .roleRef.kind }}
  name: {{ include "epic8-platform.fullname" $ }}-{{ .roleRef.name }}
  apiGroup: {{ .roleRef.apiGroup }}
{{- end }}

{{/*
Default Role Bindings for Epic 8 Services
*/}}

{{- if .Values.rbac.serviceAccounts.apiGateway.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" "api-gateway" "context" .) }}-default
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.serviceLabels" (dict "service" "api-gateway" "tier" "frontend" "component" "gateway" "context" .) | nindent 4 }}
    epic8.platform/component: rbac
    epic8.platform/rbac-type: role-binding
  annotations:
    {{- include "epic8-platform.annotations" . | nindent 4 }}
    epic8.platform/description: "Default role binding for API Gateway service"
subjects:
- kind: ServiceAccount
  name: {{ include "epic8-platform.serviceName" (dict "service" "api-gateway" "context" .) }}
  namespace: {{ include "epic8-platform.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "epic8-platform.fullname" . }}-default
  apiGroup: rbac.authorization.k8s.io
{{- end }}

