{{/*
Monitoring Role Bindings
*/}}
{{- if include "epic8-platform.monitoring.enabled" . }}
{{- range $service := list "api-gateway" "query-analyzer" "generator" "retriever" "cache" "analytics" }}
{{- $serviceConfig := index $.Values $service | default dict }}
{{- $serviceAccount := index $.Values.rbac.serviceAccounts $service | default dict }}
{{- if and $serviceConfig.enabled $serviceAccount.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" $service "context" $) }}-monitoring
  namespace: {{ include "epic8-platform.namespace" $ }}
  labels:
    {{- include "epic8-platform.labels" $ | nindent 4 }}
    epic8.platform/component: rbac
    epic8.platform/rbac-type: role-binding
    epic8.platform/role-scope: monitoring
  annotations:
    {{- include "epic8-platform.annotations" $ | nindent 4 }}
    epic8.platform/description: "Monitoring role binding for {{ $service }} service"
subjects:
- kind: ServiceAccount
  name: {{ include "epic8-platform.serviceName" (dict "service" $service "context" $) }}
  namespace: {{ include "epic8-platform.namespace" $ }}
roleRef:
  kind: Role
  name: {{ include "epic8-platform.fullname" $ }}-monitoring
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
{{- end }}

{{- end }}