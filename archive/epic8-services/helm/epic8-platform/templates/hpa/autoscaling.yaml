{{/*
Epic 8 Platform - Horizontal Pod Autoscaler Templates
Enterprise auto-scaling configuration for Epic 8 services
*/}}

{{/*
API Gateway HPA
*/}}
{{- if and .Values.apiGateway.enabled (include "epic8-platform.autoscaling.enabled" .Values.apiGateway) }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "epic8-platform.serviceName" (dict "service" "api-gateway" "context" .) }}-hpa
  namespace: {{ include "epic8-platform.namespace" . }}
  labels:
    {{- include "epic8-platform.serviceLabels" (dict "service" "api-gateway" "tier" "frontend" "component" "gateway" "context" .) | nindent 4 }}
    epic8.platform/component: autoscaling
  annotations:
    {{- include "epic8-platform.annotations" . | nindent 4 }}
    epic8.platform/description: "Horizontal Pod Autoscaler for API Gateway service"
spec:
  {{- include "epic8-platform.hpaSpec" (dict "service" .Values.apiGateway "serviceName" "api-gateway" "context" .) | nindent 2 }}
{{- end }}

