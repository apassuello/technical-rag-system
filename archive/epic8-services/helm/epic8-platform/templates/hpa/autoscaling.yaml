{{/*
Swiss Engineering Auto-scaling Notes:

1. **Resource-Based Scaling**: Uses both CPU and memory metrics for balanced scaling decisions
2. **Behavior Configuration**: Advanced scaling behavior prevents thrashing and ensures stability
3. **Predictive Scaling**: Supports custom metrics for workload-specific scaling patterns
4. **Cost Optimization**: Minimum replicas ensure baseline performance while maximum limits control costs
5. **Performance SLA**: Scaling thresholds (70% CPU, 80% memory) maintain service quality
6. **Multi-Metric Scaling**: Considers multiple resource types for comprehensive auto-scaling

Production Recommendations:
- Monitor scaling events and adjust thresholds based on actual workload patterns
- Use VPA (Vertical Pod Autoscaler) alongside HPA for complete resource optimization
- Implement custom metrics (e.g., queue length, response time) for application-specific scaling
- Set up alerting for scaling events and resource exhaustion scenarios
- Regular review of min/max replica settings based on cost and performance requirements

Enterprise Features Available:
- Predictive Auto-scaling: Based on ML models of traffic patterns
- Multi-dimensional Scaling: CPU, memory, custom metrics, external metrics
- Scaling Policies: Fine-grained control over scale-up/scale-down behavior
- Cross-service Dependencies: Consider dependencies when scaling related services
*/}}