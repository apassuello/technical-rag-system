# Epic 8 Platform - Development Environment Overrides
# Optimized for fast iteration and debugging

#============================================================================
# Global Overrides for Development
#============================================================================
global:
  environment: development
  cloudProvider: on-premises  # Often local development

  # Resource Optimization for Development
  resources:
    small:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 256Mi
      limits:
        cpu: 250m
        memory: 512Mi
        ephemeral-storage: 512Mi
    medium:
      requests:
        cpu: 200m
        memory: 512Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 1Gi
    large:
      requests:
        cpu: 300m
        memory: 768Mi
        ephemeral-storage: 768Mi
      limits:
        cpu: 750m
        memory: 1.5Gi
        ephemeral-storage: 1.5Gi

  # Development Monitoring (Reduced)
  monitoring:
    enabled: true
    prometheus:
      enabled: true
      scrapeInterval: "60s"  # Less frequent
    grafana:
      enabled: false  # Disable in dev
    jaeger:
      enabled: false  # Disable in dev
    logging:
      level: DEBUG
      format: text  # More readable in dev

  # Service Mesh (Simplified)
  serviceMesh:
    enabled: false  # Disable for faster startup
    mtls:
      enabled: false
    tracing:
      enabled: false

#============================================================================
# Service Overrides for Development
#============================================================================

# API Gateway - Single Instance
apiGateway:
  replicaCount: 1
  resources: small

  service:
    external:
      enabled: false  # No external LB in dev

  autoscaling:
    enabled: false  # Fixed replicas in dev

  health:
    liveness:
      initialDelaySeconds: 30  # Faster startup
      periodSeconds: 60
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 20
      failureThreshold: 5
    startup:
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 20

  podDisruptionBudget:
    enabled: false  # Not needed in dev

  affinity:
    podAntiAffinity:
      enabled: false  # Allow co-location

  topologySpreadConstraints:
    enabled: false

# Query Analyzer - Minimal Configuration
queryAnalyzer:
  replicaCount: 1
  resources: small

  autoscaling:
    enabled: false

  health:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 60
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 20
      failureThreshold: 5
    startup:
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 20

  model:
    complexity_classifier:
      accuracy_threshold: 0.85  # Lower threshold for dev
    feature_extractor:
      max_features: 500  # Reduced for faster processing

  podDisruptionBudget:
    enabled: false

# Generator - Development Model Configuration
generator:
  replicaCount: 1
  resources: medium  # Still needs resources for models

  autoscaling:
    enabled: false

  health:
    liveness:
      initialDelaySeconds: 60  # Still need time for models
      periodSeconds: 60
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 5
    startup:
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 30

  # Development Model Configuration
  models:
    ollama:
      enabled: true
      endpoint: "http://ollama:11434"
      models:
        - "llama3.2:1b"  # Smaller model for dev
    openai:
      enabled: false  # Disable to save costs
    anthropic:
      enabled: false  # Disable to save costs
    mistral:
      enabled: false

  cost:
    tracking:
      enabled: true
      precision: 0.01  # Less precision for dev
    optimization:
      enabled: false  # Disable optimization in dev

  podDisruptionBudget:
    enabled: false

# Retriever - Simplified Vector Configuration
retriever:
  replicaCount: 1
  resources: medium

  autoscaling:
    enabled: false

  health:
    liveness:
      initialDelaySeconds: 45
      periodSeconds: 60
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 20
      periodSeconds: 20
      failureThreshold: 5
    startup:
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 30

  vectorIndex:
    faiss:
      dimension: 384
      index_type: "Flat"  # Simpler index for dev
    persistence:
      enabled: false  # Use emptyDir for faster startup
      size: 1Gi

  bm25:
    enabled: true

  podDisruptionBudget:
    enabled: false

# Cache - In-Memory Only
cache:
  replicaCount: 1
  resources: small

  autoscaling:
    enabled: false

  health:
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 60
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 20
      failureThreshold: 5
    startup:
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 15

  redis:
    enabled: false  # Use in-memory cache only
    internal:
      persistence:
        enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi

  cache:
    ttl: 1800  # Shorter TTL for dev
    maxSize: 500
    hitRateTarget: 0.4  # Lower target for dev

  podDisruptionBudget:
    enabled: false

# Analytics - Minimal Configuration
analytics:
  replicaCount: 1
  resources: small

  autoscaling:
    enabled: false

  health:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 60
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 20
      failureThreshold: 5
    startup:
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 20

  postgresql:
    enabled: false  # Use SQLite or in-memory DB
    internal:
      persistence:
        enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi

  features:
    cost_optimization: false  # Disable complex features
    ab_testing: false
    real_time_metrics: true
    performance_monitoring: false

  podDisruptionBudget:
    enabled: false

#============================================================================
# Infrastructure Overrides for Development
#============================================================================

# Ingress - Simplified
ingress:
  enabled: false  # Use port-forward in dev

# Network Policies - Disabled
networkPolicies:
  enabled: false  # Allow all traffic in dev
  defaultDeny: false

# Storage - Minimal
storageClass:
  create: false  # Use default storage class

# RBAC - Simplified
rbac:
  create: true  # Keep for testing, but simplified

#============================================================================
# Configuration Overrides
#============================================================================

configMaps:
  common:
    data:
      LOG_LEVEL: "DEBUG"
      LOG_FORMAT: "text"
      EPIC8_ENVIRONMENT: "development"
      SERVICE_MESH_ENABLED: "false"
      HEALTH_CHECK_INTERVAL: "60"  # Longer intervals
      HEALTH_CHECK_TIMEOUT: "15"
      HEALTH_CHECK_RETRIES: "5"
      PROMETHEUS_ENABLED: "true"
      REQUEST_TIMEOUT: "60"  # Longer timeout for debugging
      MAX_CONCURRENT_REQUESTS: "20"  # Lower concurrency
      CONNECTION_POOL_SIZE: "2"
      SECURITY_ENABLED: "false"  # Simplified security
      TLS_ENABLED: "false"
      CORS_ENABLED: "true"
      CORS_ORIGINS: "*"
      CACHE_TTL: "1800"
      CACHE_MAX_SIZE: "500"
      RATE_LIMIT_ENABLED: "false"  # No rate limiting in dev
      RATE_LIMIT_REQUESTS_PER_MINUTE: "1000"
      FEATURE_ANALYTICS: "false"
      FEATURE_COST_TRACKING: "true"
      FEATURE_PERFORMANCE_MONITORING: "false"
      FEATURE_A_B_TESTING: "false"

#============================================================================
# Monitoring Overrides
#============================================================================

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 60s

grafana:
  enabled: false

jaeger:
  enabled: false

#============================================================================
# Feature Flags for Development
#============================================================================

features:
  monitoring: true
  security: false
  ingress: false
  networkPolicies: false
  autoscaling: false
  serviceMesh: false
  externalSecrets: false

# Tests - Enhanced for Development
tests:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi