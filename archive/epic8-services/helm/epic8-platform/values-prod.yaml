# Epic 8 Platform - Production Environment Overrides
# Swiss Engineering Standards for Enterprise Production Deployment

#============================================================================
# Global Overrides for Production
#============================================================================
global:
  environment: production
  cloudProvider: aws  # Primary production cloud provider

  # Production Resource Allocation (Enterprise Standards)
  resources:
    small:
      requests:
        cpu: 250m
        memory: 512Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 1Gi
    medium:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
        ephemeral-storage: 2Gi
    large:
      requests:
        cpu: "1"
        memory: 2Gi
        ephemeral-storage: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 4Gi

  # Production Monitoring (Full Enterprise Observability)
  monitoring:
    enabled: true
    prometheus:
      enabled: true
      scrapeInterval: "15s"  # High frequency for production
    grafana:
      enabled: true
    jaeger:
      enabled: true
    logging:
      level: INFO
      format: json
      timestamp: true

  # Service Mesh (Enterprise Security)
  serviceMesh:
    enabled: true
    type: istio
    mtls:
      enabled: true
      mode: STRICT  # Strict mTLS for production
    tracing:
      enabled: true

#============================================================================
# Service Overrides for Production
#============================================================================

# API Gateway - Production Scale
apiGateway:
  replicaCount: 3  # High availability baseline
  resources: medium

  service:
    external:
      enabled: true
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:region:account:certificate/cert-id"
        service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      loadBalancerSourceRanges:
        - "0.0.0.0/0"  # Global access for production

  autoscaling:
    enabled: true
    minReplicas: 3  # Minimum for high availability
    maxReplicas: 15  # Scale for high load
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
        - type: Percent
          value: 100
          periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
        - type: Percent
          value: 10
          periodSeconds: 60

  health:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      successThreshold: 1
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 3
    startup:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 30

  podDisruptionBudget:
    enabled: true
    minAvailable: 2  # Always maintain 2 instances

  affinity:
    podAntiAffinity:
      enabled: true
      weight: 100
      requiredDuringSchedulingIgnoredDuringExecution: true

  topologySpreadConstraints:
    enabled: true
    maxSkew: 1

# Query Analyzer - Production ML Configuration
queryAnalyzer:
  replicaCount: 3
  resources: large  # Upgraded for production ML workloads

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  health:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

  model:
    complexity_classifier:
      enabled: true
      accuracy_threshold: 0.95  # High accuracy requirement
    feature_extractor:
      enabled: true
      max_features: 1000

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# Generator - Production Multi-Model Configuration
generator:
  replicaCount: 4  # Higher baseline for model switching
  resources: large

  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 12
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  health:
    liveness:
      initialDelaySeconds: 120  # Allow time for model loading
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 3
    startup:
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 40

  # Production Multi-Model Configuration
  models:
    ollama:
      enabled: true
      endpoint: "http://ollama:11434"
      models:
        - "llama3.2:3b"
        - "llama3.2:1b"
        - "llama3.2:8b"  # Additional production model
    openai:
      enabled: true
      api_key_secret: epic8-secrets
      api_key_key: openai-api-key
    anthropic:
      enabled: true
      api_key_secret: epic8-secrets
      api_key_key: anthropic-api-key
    mistral:
      enabled: true
      api_key_secret: epic8-secrets
      api_key_key: mistral-api-key

  cost:
    tracking:
      enabled: true
      precision: 0.001  # High precision for cost tracking
    optimization:
      enabled: true
      target_cost_per_query: 0.01

  podDisruptionBudget:
    enabled: true
    minAvailable: 3

# Retriever - Production Vector Index Configuration
retriever:
  replicaCount: 4
  resources: large

  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 16
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  health:
    liveness:
      initialDelaySeconds: 90
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 45
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 40

  vectorIndex:
    faiss:
      enabled: true
      dimension: 384
      index_type: "HNSW"
    persistence:
      enabled: true
      storageClass: epic8-ssd-fast  # High-performance storage
      size: 50Gi  # Large production index

  bm25:
    enabled: true
    k1: 1.2
    b: 0.75

  podDisruptionBudget:
    enabled: true
    minAvailable: 3

# Cache - Production Redis Cluster
cache:
  replicaCount: 3
  resources: large  # Upgraded for production cache workload

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 9
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  health:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 20

  redis:
    enabled: true
    external:
      enabled: true  # Use managed Redis in production
      host: "epic8-redis-prod.cache.amazonaws.com"
      port: 6379
      password_secret: epic8-secrets
      password_key: redis-password
    internal:
      persistence:
        enabled: true
        storageClass: epic8-ssd-fast
        size: 20Gi
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "1"
          memory: 4Gi

  cache:
    ttl: 3600
    maxSize: 5000  # Large production cache
    hitRateTarget: 0.85  # High hit rate target

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# Analytics - Production Database Configuration
analytics:
  replicaCount: 3
  resources: large

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  health:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

  postgresql:
    enabled: true
    external:
      enabled: true  # Use managed database in production
      host: "epic8-postgres-prod.amazonaws.com"
      port: 5432
      database: epic8_analytics
      username: epic8_user
      password_secret: epic8-secrets
      password_key: postgres-password
    internal:
      persistence:
        enabled: true
        storageClass: epic8-ssd-fast
        size: 100Gi  # Large production database
      resources:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "2"
          memory: 8Gi

  features:
    cost_optimization: true
    ab_testing: true
    real_time_metrics: true
    performance_monitoring: true

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

#============================================================================
# Infrastructure Overrides for Production
#============================================================================

# Ingress - Production with Enterprise TLS
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"

  hosts:
    - host: epic8-platform.com
      paths:
        - path: /
          pathType: Prefix
          service: api-gateway
          port: 8080
        - path: /api/v1
          pathType: Prefix
          service: api-gateway
          port: 8080
    - host: api.epic8-platform.com
      paths:
        - path: /
          pathType: Prefix
          service: api-gateway
          port: 8080

  tls:
    - secretName: epic8-platform-tls
      hosts:
        - epic8-platform.com
        - api.epic8-platform.com

# Network Policies - Enterprise Security
networkPolicies:
  enabled: true
  defaultDeny: true
  allowPrometheus: true
  allowDNS: true

  policies:
    - name: api-gateway-egress
      podSelector:
        matchLabels:
          epic8.platform/service: api-gateway
      egress:
        - to:
          - podSelector:
              matchLabels:
                epic8.platform/tier: backend
        - to: []  # Allow egress to external APIs
          ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 80

    - name: backend-services-ingress
      podSelector:
        matchLabels:
          epic8.platform/tier: backend
      ingress:
        - from:
          - podSelector:
              matchLabels:
                epic8.platform/service: api-gateway

    - name: monitoring-ingress
      podSelector:
        matchLabels:
          epic8.platform/tier: backend
      ingress:
        - from:
          - namespaceSelector:
              matchLabels:
                name: monitoring
          ports:
          - protocol: TCP
            port: 9090

# Storage - High-Performance Production Storage
storageClass:
  create: true
  name: epic8-ssd-fast
  provisioner: ebs.csi.aws.com
  parameters:
    type: gp3
    iops: "3000"
    throughput: "125"
    fsType: ext4
    encrypted: "true"
  reclaimPolicy: Retain  # Protect production data
  allowVolumeExpansion: true

# RBAC - Production Security
rbac:
  create: true

  # Additional production roles
  roles:
    - name: epic8-monitoring-reader
      rules:
        - apiGroups: [""]
          resources: ["pods", "services", "endpoints"]
          verbs: ["get", "list", "watch"]

  roleBindings:
    - name: epic8-monitoring-reader-binding
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: epic8-monitoring-reader
      subjects:
        - kind: ServiceAccount
          name: prometheus
          namespace: monitoring

#============================================================================
# Configuration Overrides for Production
#============================================================================

configMaps:
  common:
    data:
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
      LOG_TIMESTAMP: "true"
      EPIC8_PLATFORM_NAME: "epic8-rag-platform"
      EPIC8_PLATFORM_VERSION: "1.0.0"
      EPIC8_ENVIRONMENT: "production"
      SERVICE_DISCOVERY_ENABLED: "true"
      SERVICE_MESH_ENABLED: "true"
      HEALTH_CHECK_INTERVAL: "30"
      HEALTH_CHECK_TIMEOUT: "10"
      HEALTH_CHECK_RETRIES: "3"
      METRICS_ENABLED: "true"
      METRICS_PORT: "9090"
      METRICS_PATH: "/metrics"
      PROMETHEUS_ENABLED: "true"
      REQUEST_TIMEOUT: "30"
      MAX_CONCURRENT_REQUESTS: "200"  # High concurrency for production
      CONNECTION_POOL_SIZE: "20"      # Large connection pool
      SECURITY_ENABLED: "true"
      TLS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGINS: "https://epic8-platform.com,https://api.epic8-platform.com"
      CACHE_TTL: "3600"
      CACHE_MAX_SIZE: "5000"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
      FEATURE_ANALYTICS: "true"
      FEATURE_COST_TRACKING: "true"
      FEATURE_PERFORMANCE_MONITORING: "true"
      FEATURE_A_B_TESTING: "true"

#============================================================================
# Monitoring Overrides for Production
#============================================================================

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s  # High frequency monitoring
    path: /metrics
    labels:
      environment: production
      tier: enterprise

grafana:
  enabled: true
  dashboards:
    enabled: true

jaeger:
  enabled: true
  agent:
    enabled: true

#============================================================================
# Feature Flags for Production
#============================================================================

features:
  monitoring: true
  security: true
  ingress: true
  networkPolicies: true
  autoscaling: true
  serviceMesh: true
  externalSecrets: true  # Use external secret management

# Tests - Production Validation
tests:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

#============================================================================
# Production-Specific Additions
#============================================================================

# External Secrets (Production Secret Management)
externalSecrets:
  enabled: true
  provider: aws-secrets-manager
  region: us-east-1
  secretStore:
    name: epic8-secrets-store
    auth:
      serviceAccount: epic8-external-secrets

# Backup Configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: "30d"
  storage:
    type: s3
    bucket: epic8-platform-backups
    region: us-east-1

# Disaster Recovery
disasterRecovery:
  enabled: true
  replicationRegion: us-west-2
  rto: "4h"   # Recovery Time Objective
  rpo: "1h"   # Recovery Point Objective