---
# API Gateway VPA Configuration
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-gateway-vpa
  namespace: epic8-prod
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: api-gateway
      mode: "Auto"
      minAllowed:
        cpu: 250m
        memory: 512Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      controlledResources: ["cpu", "memory"]

---
# Generator VPA Configuration (ML-optimized)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: generator-vpa
  namespace: epic8-prod
  labels:
    epic8.platform/service: generator
    epic8.platform/component: vpa
  annotations:
    epic8.platform/optimization: "ml-workload"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: generator
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: generator
      mode: "Auto"
      minAllowed:
        cpu: 500m
        memory: 1Gi
      maxAllowed:
        cpu: 4000m
        memory: 8Gi
      controlledResources: ["cpu", "memory"]
      # ML workload specific policies
      controlledValues: RequestsAndLimits

---
# Query Analyzer VPA Configuration (ML Classification)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: query-analyzer-vpa
  namespace: epic8-prod
  labels:
    epic8.platform/service: query-analyzer
    epic8.platform/component: vpa
  annotations:
    epic8.platform/optimization: "ml-classification"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: query-analyzer
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: query-analyzer
      mode: "Auto"
      minAllowed:
        cpu: 400m
        memory: 768Mi
      maxAllowed:
        cpu: 3000m
        memory: 6Gi
      controlledResources: ["cpu", "memory"]

---
# Retriever VPA Configuration (Vector Search)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: retriever-vpa
  namespace: epic8-prod
  labels:
    epic8.platform/service: retriever
    epic8.platform/component: vpa
  annotations:
    epic8.platform/optimization: "vector-search"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: retriever
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: retriever
      mode: "Auto"
      minAllowed:
        cpu: 300m
        memory: 512Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      controlledResources: ["cpu", "memory"]

---
# Cache VPA Configuration (Memory-optimized)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cache-vpa
  namespace: epic8-prod
  labels:
    epic8.platform/service: cache
    epic8.platform/component: vpa
  annotations:
    epic8.platform/optimization: "memory-intensive"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cache
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: cache
      mode: "Auto"
      minAllowed:
        cpu: 200m
        memory: 256Mi
      maxAllowed:
        cpu: 1000m
        memory: 2Gi
      controlledResources: ["cpu", "memory"]
      # Prioritize memory optimization for cache workloads
      controlledValues: RequestsAndLimits

---
# Analytics VPA Configuration (Background Processing)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: analytics-vpa
  namespace: epic8-prod
  labels:
    epic8.platform/service: analytics
    epic8.platform/component: vpa
  annotations:
    epic8.platform/optimization: "background-processing"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: analytics
      mode: "Auto"
      minAllowed:
        cpu: 200m
        memory: 256Mi
      maxAllowed:
        cpu: 1000m
        memory: 2Gi
      controlledResources: ["cpu", "memory"]

---
# VPA Monitoring Configuration
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: vpa-metrics
  namespace: epic8-prod
  labels:
    epic8.platform/component: vpa-monitoring
spec:
  selector:
    matchLabels:
      app: vpa-recommender
  endpoints:
  - port: metrics
    interval: 60s
    path: /metrics