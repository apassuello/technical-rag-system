---
apiVersion: v1
kind: Service
metadata:
  name: retriever
  labels:
    epic8.platform/service: retriever
    epic8.platform/component: retriever
    epic8.platform/tier: backend
    epic8.platform/version: v1
    app.kubernetes.io/name: retriever
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: retriever
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "Retriever Service - Epic 2 ModularUnifiedRetriever integration"
    epic8.platform/load-balancer: "internal"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8083"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8083
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    epic8.platform/service: retriever
    app.kubernetes.io/name: retriever
  sessionAffinity: None