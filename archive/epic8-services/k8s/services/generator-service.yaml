---
apiVersion: v1
kind: Service
metadata:
  name: generator
  labels:
    epic8.platform/service: generator
    epic8.platform/component: generator
    epic8.platform/tier: backend
    epic8.platform/version: v1
    app.kubernetes.io/name: generator
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: generator
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "Generator Service - Multi-model answer generation"
    epic8.platform/load-balancer: "internal"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8081
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    epic8.platform/service: generator
    app.kubernetes.io/name: generator
  sessionAffinity: None