---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: gateway
    epic8.platform/tier: frontend
    epic8.platform/version: v1
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "API Gateway Service - Main entry point for Epic 8 platform"
    epic8.platform/load-balancer: "external"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    epic8.platform/service: api-gateway
    app.kubernetes.io/name: api-gateway
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-external
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: gateway
    epic8.platform/tier: frontend
    epic8.platform/version: v1
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "API Gateway External Service - Public access point"
    epic8.platform/load-balancer: "external"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  selector:
    epic8.platform/service: api-gateway
    app.kubernetes.io/name: api-gateway
  sessionAffinity: None
  loadBalancerSourceRanges:
  - 0.0.0.0/0  # Allow all IPs (adjust for production security)