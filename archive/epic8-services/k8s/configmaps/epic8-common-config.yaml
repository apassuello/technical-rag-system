---
apiVersion: v1
kind: ConfigMap
metadata:
  name: epic8-common-config
  labels:
    epic8.platform/component: config
    epic8.platform/config-type: common
    epic8.platform/version: v1
    app.kubernetes.io/name: epic8-platform
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: config
  annotations:
    epic8.platform/description: "Common configuration shared across all Epic 8 services"
    epic8.platform/config-version: "1.0.0"
data:
  # Logging Configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  LOG_TIMESTAMP: "true"

  # Epic 8 Platform Settings
  EPIC8_PLATFORM_NAME: "epic8-rag-platform"
  EPIC8_PLATFORM_VERSION: "1.0.0"
  EPIC8_ENVIRONMENT: "production"

  # Service Discovery
  SERVICE_DISCOVERY_ENABLED: "true"
  SERVICE_MESH_ENABLED: "true"

  # Health Check Configuration
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "10"
  HEALTH_CHECK_RETRIES: "3"

  # Metrics and Monitoring
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  METRICS_PATH: "/metrics"
  PROMETHEUS_ENABLED: "true"

  # Performance Settings
  REQUEST_TIMEOUT: "30"
  MAX_CONCURRENT_REQUESTS: "100"
  CONNECTION_POOL_SIZE: "10"

  # Security Settings
  SECURITY_ENABLED: "true"
  TLS_ENABLED: "true"
  CORS_ENABLED: "true"
  CORS_ORIGINS: "*"  # Configure for production

  # Cache Settings
  CACHE_TTL: "3600"
  CACHE_MAX_SIZE: "1000"

  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "100"

  # Feature Flags
  FEATURE_ANALYTICS: "true"
  FEATURE_COST_TRACKING: "true"
  FEATURE_PERFORMANCE_MONITORING: "true"
  FEATURE_A_B_TESTING: "false"