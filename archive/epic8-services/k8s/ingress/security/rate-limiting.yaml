# Network Policy for Rate Limiting Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rate-limiting-network-policy
  namespace: nginx-ingress
  labels:
    epic8.platform/component: security
    epic8.platform/type: network-policy
    epic8.platform/tier: infrastructure
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nginx-ingress
      app.kubernetes.io/component: controller
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}  # Allow from all namespaces
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 10254  # Metrics
  egress:
  - to: []  # Allow all egress for upstream services
    ports:
    - protocol: TCP
      port: 8080  # API Gateway
    - protocol: TCP
      port: 8081  # Generator
    - protocol: TCP
      port: 8082  # Query Analyzer
    - protocol: TCP
      port: 8083  # Retriever
    - protocol: TCP
      port: 8084  # Cache
    - protocol: TCP
      port: 8085  # Analytics
    - protocol: TCP
      port: 9090  # Prometheus metrics
    - protocol: TCP
      port: 53   # DNS
    - protocol: UDP
      port: 53   # DNS