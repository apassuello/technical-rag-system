---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: gateway
    epic8.platform/tier: frontend
    epic8.platform/version: v1
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "API Gateway - Entry point for all Epic 8 requests"
    epic8.platform/documentation: "https://github.com/epic8/docs/services/api-gateway"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      epic8.platform/service: api-gateway
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        epic8.platform/service: api-gateway
        epic8.platform/component: gateway
        epic8.platform/tier: frontend
        epic8.platform/version: v1
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: epic8-platform
        app.kubernetes.io/component: gateway
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: epic8-api-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api-gateway
        image: epic8/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: PYTHONPATH
          value: "/app:/app/src"
        - name: PROJECT_ROOT
          value: "/app"
        - name: QUERY_ANALYZER_URL
          value: "http://query-analyzer:8082"
        - name: GENERATOR_URL
          value: "http://generator:8081"
        - name: RETRIEVER_URL
          value: "http://retriever:8083"
        - name: CACHE_URL
          value: "http://cache:8084"
        - name: ANALYTICS_URL
          value: "http://analytics:8085"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        envFrom:
        - configMapRef:
            name: epic8-common-config
        - secretRef:
            name: epic8-secrets
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
        - name: logs
          mountPath: /app/logs
        - name: cache
          mountPath: /app/cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: epic8.platform/service
                  operator: In
                  values:
                  - api-gateway
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            epic8.platform/service: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      epic8.platform/service: api-gateway