---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  labels:
    epic8.platform/service: cache
    epic8.platform/component: cache
    epic8.platform/tier: data
    epic8.platform/version: v1
    app.kubernetes.io/name: cache
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: cache
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "Cache Service - Redis-backed caching layer"
    epic8.platform/documentation: "https://github.com/epic8/docs/services/cache"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      epic8.platform/service: cache
      app.kubernetes.io/name: cache
  template:
    metadata:
      labels:
        epic8.platform/service: cache
        epic8.platform/component: cache
        epic8.platform/tier: data
        epic8.platform/version: v1
        app.kubernetes.io/name: cache
        app.kubernetes.io/part-of: epic8-platform
        app.kubernetes.io/component: cache
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: epic8-cache
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: cache
        image: epic8/cache:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8084
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: PYTHONPATH
          value: "/app:/app/src"
        - name: PROJECT_ROOT
          value: "/app"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        envFrom:
        - configMapRef:
            name: epic8-common-config
        - configMapRef:
            name: cache-config
        - secretRef:
            name: epic8-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}
      - name: logs
        persistentVolumeClaim:
          claimName: cache-logs
      # Single replica, no anti-affinity needed
      nodeSelector:
        kubernetes.io/arch: amd64
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cache-pdb
  labels:
    epic8.platform/service: cache
    epic8.platform/component: cache
spec:
  minAvailable: 0
  selector:
    matchLabels:
      epic8.platform/service: cache