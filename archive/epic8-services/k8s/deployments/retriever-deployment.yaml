---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retriever
  labels:
    epic8.platform/service: retriever
    epic8.platform/component: retriever
    epic8.platform/tier: backend
    epic8.platform/version: v1
    app.kubernetes.io/name: retriever
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: retriever
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "Retriever Service - Epic 2 ModularUnifiedRetriever integration"
    epic8.platform/documentation: "https://github.com/epic8/docs/services/retriever"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      epic8.platform/service: retriever
      app.kubernetes.io/name: retriever
  template:
    metadata:
      labels:
        epic8.platform/service: retriever
        epic8.platform/component: retriever
        epic8.platform/tier: backend
        epic8.platform/version: v1
        app.kubernetes.io/name: retriever
        app.kubernetes.io/part-of: epic8-platform
        app.kubernetes.io/component: retriever
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: epic8-retriever
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: retriever
        image: epic8/retriever:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8083
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: PYTHONPATH
          value: "/app:/app/src"
        - name: PROJECT_ROOT
          value: "/app"
        - name: WEAVIATE_URL
          value: "http://weaviate:8080"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        envFrom:
        - configMapRef:
            name: epic8-common-config
        - configMapRef:
            name: retriever-config
        - secretRef:
            name: epic8-secrets
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 2Gi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 60
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
        - name: logs
          mountPath: /app/logs
        - name: cache
          mountPath: /app/cache
        - name: data
          mountPath: /app/data
          readOnly: true
        - name: vector-indices
          mountPath: /app/vector-indices
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}
      - name: logs
        persistentVolumeClaim:
          claimName: retriever-logs
      - name: cache
        persistentVolumeClaim:
          claimName: retriever-cache
      - name: data
        persistentVolumeClaim:
          claimName: epic8-document-data
      - name: vector-indices
        persistentVolumeClaim:
          claimName: retriever-vector-indices
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: epic8.platform/service
                  operator: In
                  values:
                  - retriever
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            epic8.platform/service: retriever
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: retriever-pdb
  labels:
    epic8.platform/service: retriever
    epic8.platform/component: retriever
spec:
  minAvailable: 1
  selector:
    matchLabels:
      epic8.platform/service: retriever