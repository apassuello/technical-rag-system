---
# Kind-compatible PVCs with reduced storage sizes for testing
# These fit within Kind's storage constraints (10Gi max per PVC)

# Missing PVCs that are needed for pods to start

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: query-analyzer-models
  namespace: epic8-dev
  labels:
    epic8.platform/service: query-analyzer
    epic8.platform/component: storage
    epic8.platform/storage-type: models
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Persistent storage for Query Analyzer ML models (reduced for Kind)"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: epic8-kind-fast
  resources:
    requests:
      storage: 8Gi  # Reduced from 20Gi

