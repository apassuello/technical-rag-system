---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: epic8-api-gateway
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: rbac
    epic8.platform/version: v1
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: rbac
  annotations:
    epic8.platform/description: "Service account for API Gateway service"
secrets:
- name: epic8-api-gateway-token
automountServiceAccountToken: true

