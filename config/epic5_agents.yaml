# Epic 5: Agent-Based RAG — Query Processor Configuration
# Merge into a full system config (e.g., basic.yaml) to enable agent routing.
#
# Usage:
#   query_processor section goes under an existing config that already has
#   document_processor, embedder, retriever, and answer_generator defined.

query_processor:
  type: "intelligent"
  config:
    # --- Agent configuration ---
    agent:
      type: "react"
      enabled: true

      llm:
        provider: "openai"       # "openai" or "anthropic"
        model: "gpt-4-turbo"
        temperature: 0.7
        max_tokens: 2048

      executor:
        max_iterations: 10
        max_execution_time: 300
        early_stopping_method: "force"
        verbose: false
        handle_parsing_errors: true

      use_technical_prompts: true
      include_few_shot: true
      agent_role: "technical_docs"

    # --- Tool configuration ---
    tools:
      - calculator
      - code_analyzer
      - document_search

    # --- Memory configuration ---
    memory:
      conversation:
        max_messages: 50
      working: {}

    # --- Routing logic ---
    processor:
      use_agent_by_default: false
      complexity_threshold: 0.7
      max_agent_cost: 0.10
      enable_planning: false
      enable_parallel_execution: false
      fallback_to_rag_on_failure: true

    # --- Query Planning (disabled by default) ---
    planning:
      enabled: false
      analyzer:
        use_llm: false
      decomposer:
        use_llm: true
        max_sub_tasks: 5
      planner:
        default_strategy: "direct"
      executor:
        max_parallel_tasks: 3
        timeout_per_task: 60

    # --- Cost & Performance Budgets ---
    budgets:
      max_cost_per_query_usd: 0.10
      max_execution_time_seconds: 300
