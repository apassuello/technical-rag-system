# Epic 1 Production Configuration - Complete Multi-Model System
# This config enables Epic 1 with domain-aware processing, ML-powered analysis, and adaptive routing

# Document processor for handling input files
document_processor:
  type: "hybrid_pdf"
  config:
    chunk_size: 1024
    chunk_overlap: 128

# High-performance embedder for Epic 1
embedder:
  type: "modular"
  config:
    model:
      type: "sentence_transformer"
      config:
        model_name: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
        device: "mps"
        normalize_embeddings: true
    batch_processor:
      type: "dynamic"
      config:
        initial_batch_size: 64
        max_batch_size: 256
        optimize_for_memory: false
    cache:
      type: "memory"
      config:
        max_entries: 100000
        max_memory_mb: 1024

# Epic 1 Retriever - Modular unified retrieval
retriever:
  type: "modular_unified"
  config:
    min_semantic_alignment: 0.2
    vector_index:
      type: "faiss"
      config:
        index_type: "IndexFlatIP"
        normalize_embeddings: true
        metric: "cosine"
    
    sparse:
      type: "bm25"
      config:
        k1: 1.2                    # Calibration parameter
        b: 0.75                    # Calibration parameter (original "problematic" value)
        lowercase: true
        filter_stop_words: true
        stop_word_sets: ["english_common"]
        preserve_technical_terms: true
    
    # Basic RRF Fusion (default configuration)
    fusion:
      type: "rrf"
      config:
        k: 60                    # RRF discriminative power
        weights:
          dense: 0.7             # Dense weight
          sparse: 0.3            # Sparse weight
    
    # Basic Identity Reranker (no reranking)
    reranker:
      type: "identity"
      config:
        enabled: false

# Epic 1 Multi-Model Answer Generator with Adaptive Routing
answer_generator:
  type: "epic1"
  config:
    # Multi-model routing configuration
    routing:
      enabled: true
      default_strategy: "balanced"  # balanced cost/quality optimization
      
      # Routing strategy configurations
      strategies:
        cost_optimized:
          simple_threshold: 0.35
          complex_threshold: 0.75
          max_cost_per_query: 0.010    # $0.01 maximum per query
          model_preferences: "cheapest_first"
          
        quality_first:
          simple_threshold: 0.40
          complex_threshold: 0.70
          min_quality_score: 0.85      # Minimum acceptable quality
          model_preferences: "quality_first"
          
        balanced:
          simple_threshold: 0.35
          complex_threshold: 0.70
          cost_weight: 0.4             # 40% cost consideration
          quality_weight: 0.6          # 60% quality consideration
          max_cost_per_query: 0.020    # $0.02 maximum per query
    
    # Model mappings for different complexity levels
    models:
      simple:
        primary:
          provider: "local"
          model: "qwen2.5-1.5b-instruct"
          base_url: "http://localhost:11434/v1"
          max_cost_per_query: 0.000
          expected_quality: 0.80
          expected_latency_ms: 2000
        fallback:
          - provider: "mistral"
            model: "mistral-tiny"
            max_cost_per_query: 0.001
          - provider: "openai"
            model: "gpt-3.5-turbo"
            max_cost_per_query: 0.005

      medium:
        primary:
          provider: "local"
          model: "qwen2.5-1.5b-instruct"
          base_url: "http://localhost:11434/v1"
          max_cost_per_query: 0.000
          expected_quality: 0.85
          expected_latency_ms: 2500
        fallback:
          - provider: "mistral"
            model: "mistral-small"
            max_cost_per_query: 0.005
          - provider: "openai"
            model: "gpt-3.5-turbo"
            max_cost_per_query: 0.010

      complex:
        primary:
          provider: "local"
          model: "qwen2.5-1.5b-instruct"
          base_url: "http://localhost:11434/v1"
          max_cost_per_query: 0.000
          expected_quality: 0.85
          expected_latency_ms: 3000
        fallback:
          - provider: "openai"
            model: "gpt-4-turbo"
            max_cost_per_query: 0.050
          - provider: "mistral"
            model: "mistral-large"
            max_cost_per_query: 0.025

    # Fallback configuration
    fallback:
      enabled: true
      max_retries: 3
      retry_delay_ms: 1000
      fallback_chain: ["local/qwen2.5-1.5b-instruct"]
      fallback_on_cost_exceeded: true
      fallback_on_latency_exceeded: true
      max_latency_ms: 10000
      
    # Cost tracking configuration
    cost_tracking:
      enabled: true
      precision_places: 6          # Track to $0.000001 precision
      daily_budget_usd: 10.00      # $10 daily budget
      alert_threshold: 0.8         # Alert at 80% of budget
      export_enabled: true
      retention_days: 30
      
    # Performance monitoring
    monitoring:
      enabled: true
      track_routing_decisions: true
      track_model_performance: true
      track_cost_optimization: true
      metrics_retention_hours: 72
      slow_query_threshold_ms: 5000

# Epic 1 Query Processor with Domain-Aware Processing
query_processor:
  type: "modular"
  config:
    analyzer:
      implementation: "epic1_ml"  # Use ML-powered Epic1MLAnalyzer
      config:
        # Epic1MLAnalyzer configuration
        memory_budget_gb: 2.0  # Sufficient memory for ML models
        enable_quantization: false  # Disable for better accuracy
        model_timeout_seconds: 30
        
        # Enable all Epic 1 features
        enable_complexity_analysis: true
        enable_model_recommendation: true
        
        # Feature extraction and classification
        feature_extractor:
          enable_entity_extraction: true
          normalization_params:
            max_words: 18
            max_chars: 140
            max_sentences: 5
            max_technical_terms: 4
            max_entities: 10
        
        complexity_classifier:
          weights:
            length: 0.20
            syntactic: 0.25
            vocabulary: 0.30
            question: 0.15
            ambiguity: 0.10
          thresholds:
            simple: 0.150
            complex: 0.320
        
        model_recommender:
          strategy: "balanced"
          model_mappings:
            simple:
              provider: "local"
              model: "qwen2.5-1.5b-instruct"
              base_url: "http://localhost:11434/v1"
              max_cost: 0.001
            medium:
              provider: "local"
              model: "qwen2.5-1.5b-instruct"
              base_url: "http://localhost:11434/v1"
              max_cost: 0.001
            complex:
              provider: "local"
              model: "qwen2.5-1.5b-instruct"
              base_url: "http://localhost:11434/v1"
              max_cost: 0.001
    
    selector:
      implementation: "mmr"
      config:
        lambda_param: 0.5
        max_tokens: 2048
    
    assembler:
      implementation: "rich"
      config:
        include_sources: true
        format_citations: true

# Global settings
global_settings:
  log_level: "INFO"
  cache_enabled: true
  performance_monitoring: true
  max_concurrent_requests: 8