# Epic 5 Phase 1: Tool & Function Calling Configuration
# This config defines tool execution settings and LLM adapter configurations

# Tool Registry Configuration
tools:
  enabled: true

  # Calculator Tool
  calculator:
    enabled: true
    max_expression_length: 1000
    safe_mode: true  # Use AST-based parsing (no eval/exec)
    result_precision: 10

  # Code Analyzer Tool
  code_analyzer:
    enabled: true
    max_code_length: 50000
    analyze_syntax: true
    analyze_structure: true
    analyze_metrics: true

  # Document Search Tool
  document_search:
    enabled: true
    max_results: 10
    max_query_length: 500
    content_truncate_length: 500

# LLM Adapters for Function Calling (Phase 1)
llm_adapters:
  # OpenAI Configuration
  openai:
    enabled: true
    model: "gpt-4-turbo"
    temperature: 0.7
    max_tokens: 2048
    timeout: 30
    max_retries: 3
    function_calling:
      enabled: true
      max_iterations: 10
      parallel_calls: true

  # Anthropic Configuration
  anthropic:
    enabled: true
    model: "claude-3-5-sonnet-20241022"
    temperature: 0.7
    max_tokens: 2048
    timeout: 30
    max_retries: 3
    tool_use:
      enabled: true
      max_iterations: 10

# Tool Execution Settings
execution:
  timeout_seconds: 30
  max_concurrent_tools: 3
  enable_caching: true
  cache_ttl_seconds: 3600
  track_metrics: true

# Cost & Performance Monitoring
monitoring:
  enable_cost_tracking: true
  enable_performance_tracking: true
  max_cost_per_query_usd: 0.10
  alert_on_high_cost: true
  alert_threshold_usd: 0.05

# Security Settings
security:
  enable_input_validation: true
  enable_output_sanitization: true
  rate_limit_per_minute: 60
  block_dangerous_operations: true
