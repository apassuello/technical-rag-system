# Local development configuration.
# Uses FAISS (in-memory), identity reranker, and llama-server for generation.
# No Docker required — everything runs in-process except llama-server (native).
document_processor:
  type: "hybrid_pdf"
  config:
    chunk_size: 1024
    chunk_overlap: 128

embedder:
  type: "modular"
  config:
    model:
      type: "sentence_transformer"
      config:
        model_name: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
        device: "auto"
        normalize_embeddings: true
    batch_processor:
      type: "dynamic"
      config:
        initial_batch_size: 64
        max_batch_size: 256
    cache:
      type: "memory"
      config:
        max_entries: 50000
        max_memory_mb: 512

retriever:
  type: "modular_unified"
  config:
    vector_index:
      type: "faiss"
      config:
        index_type: "IndexFlatIP"
        normalize_embeddings: true
        metric: "cosine"
    sparse:
      type: "bm25"
      config:
        k1: 1.2
        b: 0.75
    fusion:
      type: "score_aware"
      config:
        score_weight: 0.8
        rank_weight: 0.15
        overlap_weight: 0.05
        k: 10
    reranker:
      type: "identity"

answer_generator:
  type: "adaptive_modular"
  config:
    llm_client:
      type: "local"
      config:
        model_name: "qwen2.5-1.5b-instruct"
        base_url: "http://localhost:11434/v1"
        api_key: "local"

query_processor:
  type: "modular"
  config:
    analyzer:
      implementation: "rule_based"
