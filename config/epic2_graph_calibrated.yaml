# Epic 2 Configuration with Graph Enhancement - Calibration Ready
# This config enables graph enhancement with all parameters registered for calibration

# Document processor for handling input files
document_processor:
  type: "hybrid_pdf"
  config:
    chunk_size: 1024
    chunk_overlap: 128

# High-performance embedder for Epic 2
embedder:
  type: "modular"
  config:
    model:
      type: "sentence_transformer"
      config:
        model_name: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
        device: "mps"
        normalize_embeddings: true
    batch_processor:
      type: "dynamic"
      config:
        initial_batch_size: 64
        max_batch_size: 256
        optimize_for_memory: false
    cache:
      type: "memory"
      config:
        max_entries: 100000
        max_memory_mb: 1024

# Epic 2 with Graph Enhancement - All Parameters Calibration-Ready
retriever:
  type: "modular_unified"
  config:
    min_semantic_alignment: 0.2
    vector_index:
      type: "faiss"
      config:
        index_type: "IndexFlatIP"
        normalize_embeddings: true
        metric: "cosine"
    
    sparse:
      type: "bm25"
      config:
        k1: 1.2                    # Calibration parameter
        b: 0.75                    # Calibration parameter (original "problematic" value)
        lowercase: true
        filter_stop_words: true
        stop_word_sets: ["english_common"]
        preserve_technical_terms: true
    
    # Epic 2 Feature: Graph Enhanced Fusion with All Calibration Parameters
    fusion:
      type: "graph_enhanced_rrf"
      config:
        # Base RRF configuration
        base_fusion:
          k: 60                    # Calibration parameter (RRF discriminative power)
          weights:
            dense: 0.4             # Calibration parameter
            sparse: 0.3            # Calibration parameter
        # Graph enhancement configuration
        graph_enhancement:
          enabled: true
          graph_weight: 0.3        # Calibration parameter (NEW)
          entity_boost: 0.15
          relationship_boost: 0.1
          similarity_threshold: 0.65   # Calibration parameter (NEW)
          max_connections_per_document: 15  # Calibration parameter (NEW)
          use_pagerank: true
          pagerank_damping: 0.85   # Calibration parameter (NEW)
          max_graph_hops: 3
    
    # Epic 2 Feature: Neural Reranking
    reranker:
      type: "neural"
      config:
        enabled: true
        model_name: "cross-encoder/ms-marco-MiniLM-L6-v2"
        device: "mps"
        batch_size: 32             # Calibration parameter
        max_length: 512
        max_candidates: 100        # Calibration parameter
        models:
          default_model:
            name: "cross-encoder/ms-marco-MiniLM-L6-v2"
            device: "mps"
            batch_size: 32
            max_length: 512
        default_model: "default_model"

# Mock answer generation for testing
answer_generator:
  type: "adaptive_modular"
  config:
    llm_client:
      type: "mock"
      config:
        model_name: "mock-llm-for-testing"
        response_pattern: "technical"
        include_citations: true
    
    temperature: 0.3
    max_tokens: 1024
    confidence_threshold: 0.85     # Calibration parameter
    
    prompt_builder:
      type: "simple"
      config:
        max_context_length: 12000
        include_instructions: true
        citation_style: "inline"
    
    response_parser:
      type: "markdown"
      config:
        preserve_formatting: true
        extract_citations: true
    
    confidence_scorer:
      type: "semantic"
      config:
        relevance_weight: 0.4
        grounding_weight: 0.4
        quality_weight: 0.2

# Global settings
global_settings:
  log_level: "INFO"
  cache_enabled: true
  performance_monitoring: true
  max_concurrent_requests: 8