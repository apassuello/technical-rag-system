# Model Configuration for RAG Portfolio System
#
# This file defines all ML models used in the system, including:
# - Model locations and versions
# - Cache directories
# - Model-specific configurations
# - Download sources

# Global model settings
global:
  # Default cache directory (can be overridden per model type)
  cache_dir: ~/.cache/huggingface

  # Model download settings
  download:
    timeout_seconds: 1800  # 30 minutes
    retry_attempts: 3
    verify_ssl: true

  # Model loading settings
  loading:
    device: auto  # auto, cpu, cuda, mps
    trust_remote_code: false  # Security: don't execute remote code

# Sentence Transformer Models (Embeddings)
sentence_transformers:
  # Default embedding model
  default:
    name: sentence-transformers/all-MiniLM-L6-v2
    version: latest
    size_mb: 90
    embedding_dim: 384
    max_seq_length: 256
    purpose: Default embedding model for document and query encoding
    required: true
    config:
      device: auto
      normalize_embeddings: true
      show_progress_bar: true

  # Multi-QA optimized model
  multi_qa:
    name: sentence-transformers/multi-qa-MiniLM-L6-cos-v1
    version: latest
    size_mb: 90
    embedding_dim: 384
    max_seq_length: 512
    purpose: Multi-QA optimized for question-answering tasks
    required: true
    config:
      device: auto
      normalize_embeddings: true
      show_progress_bar: true

# Cross-Encoder Models (Reranking)
cross_encoders:
  # MS MARCO reranker
  ms_marco:
    name: cross-encoder/ms-marco-MiniLM-L6-v2
    version: latest
    size_mb: 90
    max_length: 512
    purpose: Semantic reranking for retrieval results
    required: false  # Optional - used in Epic 2 advanced features
    config:
      device: auto
      default_activation_function: null  # Use model default

# spaCy Models (NLP)
spacy:
  # Small English model
  en_core_web_sm:
    name: en_core_web_sm
    version: "3.7"
    size_mb: 40
    purpose: NLP analysis (entities, POS tagging, dependencies)
    required: false  # Optional - used in query processor
    features:
      - tokenization
      - pos_tagging
      - lemmatization
      - dependency_parsing
      - named_entity_recognition
    config:
      disable: []  # Components to disable (for performance)

# Local LLM Models (via llama-server OpenAI adapter)
local_llm:
  # Qwen 2.5 1.5B Instruct model
  qwen2_5_1_5b:
    name: qwen2.5-1.5b-instruct
    version: latest
    size_mb: 1000  # ~1GB
    purpose: Local LLM for answer generation via llama-server
    required: false  # Optional - can use API alternatives
    config:
      # llama-server settings (OpenAI-compatible)
      base_url: http://localhost:11434/v1
      api_key: local
      timeout_seconds: 30

      # Generation parameters (can be overridden per request)
      temperature: 0.7
      top_p: 0.9
      top_k: 40
      num_predict: 512
      stop: []

# Model aliases (for easier reference in code)
aliases:
  embedder: sentence-transformers/all-MiniLM-L6-v2
  reranker: cross-encoder/ms-marco-MiniLM-L6-v2
  nlp: en_core_web_sm
  llm: qwen2.5-1.5b-instruct

# Model download priorities
download_priority:
  required:
    - sentence-transformers/all-MiniLM-L6-v2
    - sentence-transformers/multi-qa-MiniLM-L6-cos-v1

  recommended:
    - cross-encoder/ms-marco-MiniLM-L6-v2
    - en_core_web_sm

  optional:
    - qwen2.5-1.5b-instruct

# Disk space requirements
disk_space:
  minimal:  # Required models only
    size_mb: 180
    models:
      - sentence-transformers/all-MiniLM-L6-v2
      - sentence-transformers/multi-qa-MiniLM-L6-cos-v1

  recommended:  # Required + recommended
    size_mb: 310
    models:
      - sentence-transformers/all-MiniLM-L6-v2
      - sentence-transformers/multi-qa-MiniLM-L6-cos-v1
      - cross-encoder/ms-marco-MiniLM-L6-v2
      - en_core_web_sm

  full:  # All models
    size_mb: 1310
    models:
      - sentence-transformers/all-MiniLM-L6-v2
      - sentence-transformers/multi-qa-MiniLM-L6-cos-v1
      - cross-encoder/ms-marco-MiniLM-L6-v2
      - en_core_web_sm
      - qwen2.5-1.5b-instruct

# Docker-specific configurations
docker:
  # Volume mount points for model caching
  volumes:
    huggingface_cache:
      host: ~/.cache/huggingface
      container: /root/.cache/huggingface
      purpose: HuggingFace models (sentence-transformers, cross-encoders)

    spacy_models:
      host: ~/.local/lib/python3.*/site-packages
      container: /usr/local/lib/python3.*/site-packages
      purpose: spaCy models

    local_llm_models:
      host: ~/.cache/llama-server
      container: /root/.cache/llama-server
      purpose: Local LLM models (llama-server)

  # Models to pre-download in Docker build
  preload_in_build:
    - sentence-transformers/all-MiniLM-L6-v2
    - sentence-transformers/multi-qa-MiniLM-L6-cos-v1

  # Models to pull at runtime
  pull_at_runtime:
    - qwen2.5-1.5b-instruct  # Too large for build layer

# HuggingFace Spaces deployment
huggingface_spaces:
  # Models to include in deployment
  included_models:
    - sentence-transformers/all-MiniLM-L6-v2
    - sentence-transformers/multi-qa-MiniLM-L6-cos-v1

  # Models to exclude (use APIs instead)
  excluded_models:
    - qwen2.5-1.5b-instruct  # Use HF Inference API instead

  # Storage limits
  storage_limit_mb: 500  # Typical free tier limit

# Model migration paths (for future upgrades)
migrations:
  # If upgrading models, map old -> new
  deprecated:
    all-mpnet-base-v2: sentence-transformers/all-MiniLM-L6-v2

  # Planned upgrades
  future:
    # Could upgrade to larger models if needed
    # all-MiniLM-L6-v2: all-MiniLM-L12-v2

# Environment-specific overrides
environments:
  development:
    # Smaller models for faster iteration
    default_device: cpu
    enable_all_models: false

  staging:
    # All models enabled for testing
    default_device: auto
    enable_all_models: true

  production:
    # Optimized for performance
    default_device: cuda  # or mps for Mac
    enable_all_models: true
    enable_model_caching: true

# Security settings
security:
  # Trust settings for model downloads
  allow_remote_code: false  # NEVER allow remote code execution
  verify_checksums: true

  # Network security
  use_ssl: true
  proxy_settings: null  # Set if behind corporate proxy

  # Model scanning (future)
  scan_for_malware: false  # Could integrate with security tools
