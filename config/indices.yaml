# Vector Index Configuration
# This file documents the index building and management configuration

# Index storage configuration
indices:
  # Directory where indices are stored
  storage_dir: "data/indices"

  # Index types to build
  types:
    - name: "main"
      type: "faiss"
      description: "Main FAISS vector index for semantic search"

  # File naming convention
  files:
    faiss_index: "faiss_index.bin"        # FAISS binary index file
    documents: "documents.pkl"             # Pickled documents with metadata
    metadata: "index_metadata.json"        # Index metadata and statistics

# Document processing configuration
documents:
  # Source directories
  sources:
    - path: "data/test"
      description: "Test documents (PDFs, markdown)"
      recursive: true

    - path: "data/evaluation"
      description: "Evaluation documents"
      recursive: false

  # Supported file types
  file_types:
    - ".pdf"
    - ".txt"
    - ".md"

  # Processing options
  processing:
    chunk_size: 1024                       # Characters per chunk
    chunk_overlap: 128                     # Overlap between chunks
    batch_size: 32                         # Documents per batch for embedding

# Embedding configuration
embeddings:
  # Model configuration (should match config/default.yaml)
  model: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
  dimension: 384
  normalize: true
  device: "mps"                            # Apple Silicon acceleration

  # Batch processing
  batch_size: 64
  max_batch_size: 256

# Index building options
build:
  # Index type configuration
  index_type: "IndexFlatIP"                # FAISS index type (Inner Product)
  metric: "cosine"                         # Distance metric

  # Performance options
  parallel_processing: false               # Multi-process document processing
  num_workers: 4                           # Worker processes if parallel

  # Memory management
  max_memory_gb: 8                         # Maximum memory usage
  checkpoint_every: 1000                   # Save checkpoint every N documents

  # Incremental updates
  incremental:
    enabled: true                          # Support incremental updates
    hash_algorithm: "sha256"               # File change detection

# Verification options
verification:
  # Checks to perform
  checks:
    - file_existence
    - metadata_validation
    - document_integrity
    - index_structure
    - search_functionality

  # Benchmark settings
  benchmark:
    num_queries: 10                        # Test queries for benchmarking
    report_percentiles: [50, 95, 99]       # Latency percentiles to report

# Maintenance
maintenance:
  # Backup strategy
  backup:
    enabled: true
    directory: "data/indices/backups"
    keep_last: 5                           # Keep last N backups

  # Optimization
  optimization:
    auto_optimize: false                   # Auto-optimize index after build
    optimize_threshold: 10000              # Optimize if more than N documents

# Monitoring
monitoring:
  # Metrics to track
  metrics:
    - document_count
    - index_size_mb
    - embedding_dimension
    - average_search_time_ms
    - cache_hit_rate

  # Logging
  logging:
    level: "INFO"
    log_file: "logs/index_building.log"

# Integration with retriever
retriever:
  # How retriever loads indices
  loading:
    lazy_load: false                       # Load index on startup vs on-demand
    preload_cache: true                    # Preload frequently used data

  # Index refresh
  refresh:
    auto_refresh: false                    # Auto-refresh when index changes
    check_interval_seconds: 300            # How often to check for updates
