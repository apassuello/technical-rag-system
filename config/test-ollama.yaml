# Epic 1 Test Configuration - Ollama Only (Local Models)
# Uses only local Ollama models - no external API dependencies

# Document processor for handling input files
document_processor:
  type: "hybrid_pdf"
  config:
    chunk_size: 1024
    chunk_overlap: 128

# High-performance embedder for Epic 1
embedder:
  type: "modular"
  config:
    model:
      type: "sentence_transformer"
      config:
        model_name: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
        device: "auto"
        normalize_embeddings: true
    batch_processor:
      type: "dynamic"
      config:
        initial_batch_size: 64
        max_batch_size: 256
        optimize_for_memory: false
    cache:
      type: "memory"
      config:
        max_entries: 100000
        max_memory_mb: 1024

# Epic 1 Retriever - Modular unified retrieval
retriever:
  type: "modular_unified"
  config:
    min_semantic_alignment: 0.2
    vector_index:
      type: "faiss"
      config:
        index_type: "IndexFlatIP"
        normalize_embeddings: true
        metric: "cosine"

    sparse:
      type: "bm25"
      config:
        k1: 1.2
        b: 0.75
        lowercase: true
        filter_stop_words: true
        stop_word_sets: ["english_common"]
        preserve_technical_terms: true

    fusion:
      type: "rrf"
      config:
        k: 60
        weights:
          dense: 0.7
          sparse: 0.3

    reranker:
      type: "identity"
      config:
        enabled: false

# Epic 1 Multi-Model Answer Generator - Ollama Only
answer_generator:
  type: "epic1"
  config:
    routing:
      enabled: true
      default_strategy: "balanced"

      strategies:
        cost_optimized:
          simple_threshold: 0.35
          complex_threshold: 0.75
          max_cost_per_query: 0.000
          model_preferences: "cheapest_first"

        quality_first:
          simple_threshold: 0.40
          complex_threshold: 0.70
          min_quality_score: 0.80
          model_preferences: "quality_first"

        balanced:
          simple_threshold: 0.35
          complex_threshold: 0.70
          cost_weight: 0.0
          quality_weight: 1.0
          max_cost_per_query: 0.000

    # Model mappings - Ollama only
    models:
      simple:
        primary:
          provider: "ollama"
          model: "llama3.2:3b"
          max_cost_per_query: 0.000
          expected_quality: 0.80
          expected_latency_ms: 2000
        fallback:
          - provider: "ollama"
            model: "tinyllama"
            max_cost_per_query: 0.000
            expected_quality: 0.70
            expected_latency_ms: 1500

      medium:
        primary:
          provider: "ollama"
          model: "llama3.2:3b"
          max_cost_per_query: 0.000
          expected_quality: 0.85
          expected_latency_ms: 2500
        fallback:
          - provider: "ollama"
            model: "tinyllama"
            max_cost_per_query: 0.000
            expected_quality: 0.70
            expected_latency_ms: 1500

      complex:
        primary:
          provider: "ollama"
          model: "llama3.2:3b"
          max_cost_per_query: 0.000
          expected_quality: 0.85
          expected_latency_ms: 3000
        fallback:
          - provider: "ollama"
            model: "tinyllama"
            max_cost_per_query: 0.000
            expected_quality: 0.70
            expected_latency_ms: 2000

    # Fallback configuration - Ollama only
    fallback:
      enabled: true
      max_retries: 3
      retry_delay_ms: 1000
      fallback_chain: ["ollama/llama3.2:3b", "ollama/tinyllama"]
      fallback_on_cost_exceeded: false
      fallback_on_latency_exceeded: true
      max_latency_ms: 10000

    # Cost tracking disabled for local models
    cost_tracking:
      enabled: false

    # Performance monitoring
    monitoring:
      enabled: true
      track_routing_decisions: true
      track_model_performance: true
      track_cost_optimization: false
      metrics_retention_hours: 72
      slow_query_threshold_ms: 5000

# Epic 1 Query Processor with Domain-Aware Processing
query_processor:
  type: "modular"
  config:
    analyzer:
      implementation: "epic1_ml"
      config:
        memory_budget_gb: 2.0
        enable_quantization: false
        model_timeout_seconds: 30

        enable_complexity_analysis: true
        enable_model_recommendation: true

        feature_extractor:
          enable_entity_extraction: true
          normalization_params:
            max_words: 18
            max_chars: 140
            max_sentences: 5
            max_technical_terms: 4
            max_entities: 10

        # Epic1MLAnalyzer multi-view configuration
        multi_view_config:
          views:
            technical:
              type: "ml"
              model: "sentence-transformers/all-MiniLM-L6-v2"
              weight: 0.25

            linguistic:
              type: "hybrid"
              algorithmic_weight: 0.3
              ml_weight: 0.7
              model: "distilbert-base-uncased"
              weight: 0.25

            task:
              type: "hybrid"
              algorithmic_weight: 0.4
              ml_weight: 0.6
              model: "microsoft/deberta-v3-base"
              weight: 0.25

            domain:
              type: "ml"
              model: "sentence-transformers/all-MiniLM-L6-v2"
              weight: 0.25

          fusion_strategy: "weighted_average"
          confidence_threshold: 0.6

        complexity_classifier:
          weights:
            length: 0.20
            syntactic: 0.25
            vocabulary: 0.30
            question: 0.15
            ambiguity: 0.10
          thresholds:
            simple: 0.150
            complex: 0.320

        model_recommender:
          strategy: "balanced"
          model_mappings:
            simple:
              provider: "ollama"
              model: "llama3.2:3b"
              max_cost: 0.001
            medium:
              provider: "ollama"
              model: "llama3.2:3b"
              max_cost: 0.001
            complex:
              provider: "ollama"
              model: "llama3.2:3b"
              max_cost: 0.001

    selector:
      implementation: "mmr"
      config:
        lambda_param: 0.5
        max_tokens: 2048

    assembler:
      implementation: "rich"
      config:
        include_sources: true
        format_citations: true

# Global settings
global_settings:
  log_level: "INFO"
  cache_enabled: true
  performance_monitoring: true
  max_concurrent_requests: 8
