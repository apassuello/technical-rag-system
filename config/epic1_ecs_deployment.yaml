# Epic 8 Platform - ECS Deployment Configuration
# 3-Tier Model Routing for AWS Deployment with $100 Budget
#
# Model Strategy:
# - Simple queries (complexity < 3): Local Ollama llama3.2:3b [FREE]
# - Medium queries (3 ≤ complexity < 7): HuggingFace API Mistral-7B [FREE with tokens]
# - Complex queries (complexity ≥ 7): HuggingFace API GPT-OSS-20B [FREE tier/cheap]
#
# Expected Distribution: 60% simple, 30% medium, 10% complex
# Expected Cost: ~$0/day for models + $3.20/day for infrastructure = $3.20/day total
# Budget Runtime: $100 ÷ $3.20 = 31 days continuous availability

platform:
  name: "epic8-ecs-deployment"
  version: "1.0.0"
  environment: "production"
  deployment_target: "aws-ecs-fargate"

# Global Settings
global_settings:
  log_level: "INFO"
  enable_metrics: true
  enable_tracing: false  # Disable to save costs
  cache_responses: true
  cache_ttl_seconds: 3600

# Answer Generator Configuration
generator:
  type: "epic1_multi_model"
  name: "Epic1AdaptiveGenerator"

  # Model Configurations
  models:
    # ─────────────────────────────────────────────────────────────────
    # Tier 1: Simple Queries (Local Ollama)
    # ─────────────────────────────────────────────────────────────────
    # Use Case: Basic questions, short queries, simple lookups
    # Cost: FREE (running on your Mac)
    # Latency: 0.5-1s
    # Quality: Good for simple tasks
    # ─────────────────────────────────────────────────────────────────
    simple:
      provider: "ollama"
      model_name: "llama3.2:3b"
      description: "Fast local model for simple queries"

      config:
        base_url: "${OLLAMA_URL}"  # ngrok tunnel URL from Secrets Manager
        temperature: 0.7
        max_tokens: 512
        top_p: 0.9
        timeout: 30

      # Adapter configuration
      adapter:
        type: "ollama"
        retry_attempts: 2
        retry_delay: 1
        fallback_enabled: true

      # Cost tracking
      cost:
        per_1k_tokens: 0.0  # FREE
        estimated_daily: 0.0

    # ─────────────────────────────────────────────────────────────────
    # Tier 2: Medium Queries (HuggingFace API)
    # ─────────────────────────────────────────────────────────────────
    # Use Case: Moderate complexity, multi-step reasoning
    # Cost: FREE (using your HF subscription tokens)
    # Latency: 1-2s
    # Quality: Better instruction following, better reasoning
    # ─────────────────────────────────────────────────────────────────
    medium:
      provider: "huggingface"
      model_name: "mistralai/Mistral-7B-Instruct-v0.2"
      description: "HuggingFace API model for medium complexity queries"

      config:
        api_token: "${HUGGINGFACE_TOKEN}"  # From Secrets Manager
        use_inference_api: true  # Use HF Inference API (not local)
        temperature: 0.7
        max_tokens: 1024
        top_p: 0.95
        timeout: 60

      # Adapter configuration
      adapter:
        type: "huggingface"
        retry_attempts: 3
        retry_delay: 2
        fallback_enabled: true

      # Cost tracking
      cost:
        per_1k_tokens: 0.0  # FREE with your tokens
        estimated_daily: 0.0

    # ─────────────────────────────────────────────────────────────────
    # Tier 3: Complex Queries (GPT-OSS via HuggingFace)
    # ─────────────────────────────────────────────────────────────────
    # Use Case: Complex reasoning, technical analysis, comprehensive answers
    # Cost: FREE tier (1000 requests/month) then ~$0.01 per 1K tokens
    # Latency: 2-4s
    # Quality: Best reasoning capabilities, matches GPT-4-mini quality
    # ─────────────────────────────────────────────────────────────────
    complex:
      provider: "huggingface"
      model_name: "openai/gpt-oss-20b"
      description: "GPT-OSS 20B model for complex queries via HuggingFace API"

      config:
        api_token: "${HUGGINGFACE_TOKEN}"  # From Secrets Manager
        use_inference_api: true  # Use HF Inference API
        temperature: 0.7
        max_tokens: 2048
        top_p: 0.95
        timeout: 120

      # Adapter configuration
      adapter:
        type: "huggingface"
        retry_attempts: 3
        retry_delay: 5
        fallback_enabled: true

      # Cost tracking
      cost:
        per_1k_tokens: 0.01  # After free tier
        estimated_daily: 0.10  # Assuming 10% of queries, ~10 queries/day

  # ═══════════════════════════════════════════════════════════════════
  # Adaptive Routing Configuration (Epic 1)
  # ═══════════════════════════════════════════════════════════════════
  routing:
    strategy: "complexity_based"

    # Complexity Thresholds (0-10 scale)
    # Based on query analysis: length, entities, technical terms, relationships
    thresholds:
      simple_max: 2.9      # Complexity ≤ 2.9 → use simple model
      medium_max: 6.9      # 3.0 ≤ Complexity ≤ 6.9 → use medium model
      complex_min: 7.0     # Complexity ≥ 7.0 → use complex model

    # Fallback Strategy
    # If primary model fails, try fallback models in order
    fallback:
      enabled: true
      order: ["complex", "medium", "simple"]  # Try best model first, then downgrade
      max_attempts: 3

    # Cost Optimization
    cost_optimization:
      enabled: true
      prefer_free_models: true  # Prefer models with $0 cost when complexity is borderline
      cache_responses: true
      cache_ttl_seconds: 3600

      # Budget protection
      daily_budget_usd: 3.20  # Infrastructure + minimal model costs
      alert_threshold: 0.8    # Alert at 80% of budget

    # Quality Assurance
    quality_checks:
      min_answer_length: 20  # Characters
      require_citations: true
      confidence_threshold: 0.5

  # ═══════════════════════════════════════════════════════════════════
  # Prompt Configuration
  # ═══════════════════════════════════════════════════════════════════
  prompts:
    # System prompt for all models
    system_prompt: |
      You are a helpful AI assistant specialized in answering questions based on provided context.

      Instructions:
      1. Answer the question using ONLY the information from the provided context
      2. Always cite your sources using [Document N] or [Document N, Page M] format
      3. If the context doesn't contain enough information, acknowledge this
      4. Be concise but comprehensive
      5. Use clear, technical language appropriate for the query complexity

    # Context template
    context_template: |
      Context Documents:
      {context}

      Question: {query}

      Instructions: Provide a clear, well-cited answer based on the context above.

      Answer:

    # Few-shot examples (optional, for better consistency)
    examples:
      - query: "What is machine learning?"
        context: "Machine learning is a subset of AI that enables systems to learn from data."
        answer: "Machine learning is a subset of artificial intelligence that enables systems to learn from data [Document 1]. This allows computers to improve their performance on tasks without being explicitly programmed for each scenario."

# ═══════════════════════════════════════════════════════════════════
# Query Analyzer Configuration (Epic 1)
# ═══════════════════════════════════════════════════════════════════
query_analyzer:
  type: "epic1_complexity"
  name: "Epic1ComplexityAnalyzer"

  config:
    # Features used for complexity analysis
    features:
      - name: "query_length"
        weight: 0.2
        description: "Number of words in query"

      - name: "entity_count"
        weight: 0.3
        description: "Number of named entities (people, places, organizations)"

      - name: "technical_terms"
        weight: 0.3
        description: "Presence of technical/domain-specific vocabulary"

      - name: "relationship_complexity"
        weight: 0.2
        description: "Number of relationships and logical connections"

    # Complexity scoring thresholds
    scoring:
      # Simple query indicators
      simple_indicators:
        - "what is"
        - "define"
        - "who is"
        - "when did"
        - "where is"
        - max_word_count: 10

      # Complex query indicators
      complex_indicators:
        - "analyze"
        - "compare and contrast"
        - "evaluate"
        - "comprehensive"
        - "in detail"
        - min_word_count: 20
        - min_entities: 3

# ═══════════════════════════════════════════════════════════════════
# Logging Configuration
# ═══════════════════════════════════════════════════════════════════
logging:
  level: "INFO"
  format: "json"  # JSON for CloudWatch Logs Insights

  outputs:
    - type: "stdout"
      enabled: true

    - type: "cloudwatch"
      enabled: true
      log_group: "/ecs/epic8-generator"
      log_stream: "generator-{task-id}"

  # Log routing decisions for debugging
  log_routing_decisions: true
  log_model_performance: true
  log_cost_tracking: true

  # Fields to include in logs
  fields:
    - timestamp
    - service_name
    - query_id
    - query_text
    - complexity_score
    - model_selected
    - model_used  # Actual model (may differ from selected if fallback used)
    - latency_ms
    - token_count
    - cost_usd
    - success
    - error_message

# ═══════════════════════════════════════════════════════════════════
# Monitoring Configuration
# ═══════════════════════════════════════════════════════════════════
monitoring:
  enabled: true

  # Metrics to track
  metrics:
    # Request metrics
    - name: "request_count"
      type: "counter"
      labels: ["service", "endpoint", "status"]

    - name: "request_latency"
      type: "histogram"
      labels: ["service", "endpoint"]
      buckets: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]

    # Model metrics
    - name: "model_usage_count"
      type: "counter"
      labels: ["model", "tier", "status"]

    - name: "model_latency"
      type: "histogram"
      labels: ["model", "tier"]
      buckets: [0.5, 1.0, 2.0, 4.0, 8.0, 15.0]

    # Routing metrics
    - name: "routing_decisions"
      type: "counter"
      labels: ["complexity_tier", "model_selected"]

    - name: "complexity_distribution"
      type: "histogram"
      labels: []
      buckets: [1.0, 3.0, 5.0, 7.0, 9.0, 10.0]

    # Cost metrics
    - name: "cost_per_request"
      type: "histogram"
      labels: ["model"]
      buckets: [0.0, 0.001, 0.01, 0.1, 1.0]

    - name: "daily_cost_estimate"
      type: "gauge"
      labels: ["component"]

    # Error metrics
    - name: "error_rate"
      type: "counter"
      labels: ["service", "error_type"]

    - name: "fallback_usage"
      type: "counter"
      labels: ["primary_model", "fallback_model", "reason"]

  # CloudWatch integration
  cloudwatch:
    namespace: "Epic8/RAG"
    region: "us-east-1"
    enabled: true

    # Custom metrics
    custom_metrics:
      - name: "ModelDistribution"
        unit: "Percent"
        dimensions:
          - name: "ModelTier"
            value: "simple|medium|complex"

      - name: "AverageCost"
        unit: "None"  # USD
        dimensions:
          - name: "TimeWindow"
            value: "1hour|1day|1week"

# ═══════════════════════════════════════════════════════════════════
# Health Check Configuration
# ═══════════════════════════════════════════════════════════════════
health:
  endpoint: "/health"
  checks:
    - name: "ollama_connectivity"
      type: "http"
      url: "${OLLAMA_URL}/api/version"
      timeout: 5
      critical: false  # Don't fail health check if Ollama is down

    - name: "huggingface_api"
      type: "http"
      url: "https://api-inference.huggingface.co/"
      timeout: 5
      critical: true  # Fail health check if HF API is down

    - name: "model_warmup"
      type: "custom"
      description: "Verify at least one model is responding"
      timeout: 30
      critical: true

# ═══════════════════════════════════════════════════════════════════
# Performance Tuning
# ═══════════════════════════════════════════════════════════════════
performance:
  # Request handling
  max_concurrent_requests: 10
  request_timeout: 60

  # Model-specific timeouts
  model_timeouts:
    simple: 30   # seconds
    medium: 60
    complex: 120

  # Caching
  cache:
    enabled: true
    backend: "memory"  # Use in-memory cache (no Redis to save costs)
    max_size: 1000     # entries
    ttl: 3600          # seconds

  # Batching (future optimization)
  batching:
    enabled: false  # Not needed for current load
    max_batch_size: 10
    max_wait_ms: 100

# ═══════════════════════════════════════════════════════════════════
# Security Configuration
# ═══════════════════════════════════════════════════════════════════
security:
  # API authentication (optional for demo)
  authentication:
    enabled: false  # Enable for production
    type: "bearer_token"

  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst: 10

  # Input validation
  validation:
    max_query_length: 1000  # characters
    max_context_length: 10000
    allowed_characters: "alphanumeric_punctuation"

# ═══════════════════════════════════════════════════════════════════
# Deployment Metadata
# ═══════════════════════════════════════════════════════════════════
deployment:
  platform: "aws-ecs-fargate"
  region: "us-east-1"
  cluster: "epic8-ecs-cluster"

  services:
    - name: "api-gateway"
      port: 8000
      replicas: 1

    - name: "query-analyzer"
      port: 8001
      replicas: 1

    - name: "generator"
      port: 8002
      replicas: 1

    - name: "analytics"
      port: 8003
      replicas: 1

  # Resource allocation
  resources:
    api_gateway:
      cpu: 256  # 0.25 vCPU
      memory: 512  # MB

    query_analyzer:
      cpu: 256
      memory: 512

    generator:
      cpu: 256
      memory: 512

    analytics:
      cpu: 256
      memory: 512

  # Cost estimates
  cost_estimate:
    daily_infrastructure: 3.20  # USD
    daily_models: 0.00  # USD (all free tier)
    total_daily: 3.20  # USD
    budget_days: 31  # With $100 budget

# ═══════════════════════════════════════════════════════════════════
# Feature Flags
# ═══════════════════════════════════════════════════════════════════
features:
  enable_adaptive_routing: true
  enable_cost_optimization: true
  enable_response_caching: true
  enable_metrics_collection: true
  enable_fallback_models: true
  enable_quality_checks: true

# ═══════════════════════════════════════════════════════════════════
# Expected Performance Characteristics
# ═══════════════════════════════════════════════════════════════════
# These are expectations based on the model tier distribution and
# individual model characteristics. Actual performance may vary.
#
# Request Distribution:
# - 60% simple queries  → llama3.2:3b (0.5-1s latency)
# - 30% medium queries  → Mistral-7B (1-2s latency)
# - 10% complex queries → GPT-OSS-20B (2-4s latency)
#
# Overall System Performance:
# - Average latency: ~1.5 seconds
# - P95 latency: ~3 seconds
# - P99 latency: ~5 seconds
# - Throughput: ~2-5 req/sec (single replica)
# - Success rate: >99% (with fallbacks)
#
# Cost Performance:
# - Average cost per request: ~$0.001 (essentially free)
# - Daily cost: $3.20 (infrastructure only)
# - Monthly cost: ~$96 (within budget)
# - Cost per 1000 requests: ~$1 (infrastructure amortized)
# ═══════════════════════════════════════════════════════════════════
