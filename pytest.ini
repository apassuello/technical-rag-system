[tool:pytest]
# RAG Portfolio Project - PyTest Configuration with Coverage

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .venv venv node_modules __pycache__ dist build *.egg scripts demos tools

# Default options (coverage is opt-in, not default)
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short

# Markers for test categorization
markers =
    unit: Unit tests with mocks only (fast, no external deps)
    component: Component tests with lightweight deps (moderate speed)
    integration: Integration tests with real dependencies (slow, heavy)
    epic1: Epic 1 Multi-Model System tests
    epic8: Epic 8 Cloud-Native Microservices tests
    epic2: Epic 2 Advanced Retrieval tests
    smoke: Quick smoke tests
    slow: Slow running tests (>5 seconds)
    api: Tests requiring external API calls
    api_integration: API integration tests
    real_api: Tests using real API endpoints (not mocks)
    phase2: Epic 1 Phase 2 multi-model tests
    ml: Machine learning component tests
    infrastructure: Infrastructure and deployment tests
    performance: Performance and benchmark tests
    regression: Regression and bug fix validation tests
    requires_ml: Requires ML dependencies (torch, transformers, sentence-transformers)
    requires_ollama: Requires Ollama service running on localhost:11434
    requires_postgres: Requires PostgreSQL database
    requires_redis: Requires Redis cache service
    validation: Validation tests checking retrieval and answer quality

# Test execution settings
timeout = 600
timeout_method = thread

# Warnings configuration - suppress external library warnings, keep our own visible
# Note: System-level SWIG/FAISS warnings require PYTHONWARNINGS environment variable
filterwarnings =
    # External library specific warnings
    ignore::DeprecationWarning:faiss.*
    ignore::DeprecationWarning:click.*
    ignore::DeprecationWarning:spacy.*
    ignore::DeprecationWarning:weasel.*
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:sentence_transformers.*
    ignore::DeprecationWarning:transformers.*
    ignore::DeprecationWarning:torch.*
    ignore::DeprecationWarning:numpy.*
    ignore::DeprecationWarning:sklearn.*
    ignore::DeprecationWarning:scipy.*
    ignore::PendingDeprecationWarning
    ignore::UserWarning:faiss.*
    ignore::RuntimeWarning:faiss.*
    # Pydantic specific warnings  
    ignore::PydanticDeprecatedSince20
    # Test framework warnings
    ignore::pytest.PytestUnknownMarkWarning
    # Redis integration config warnings
    ignore::RuntimeWarning:.*redis_integration_config.*
    # Keep our own warnings visible - these will show through
    default::UserWarning:src.*
    default::RuntimeWarning:src.*
    default::PerformanceWarning:src.*

# Logging configuration for tests
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S