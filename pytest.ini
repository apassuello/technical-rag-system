[tool:pytest]
# RAG Portfolio Project - PyTest Configuration with Coverage

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=json:coverage.json
    --cov-report=xml:coverage.xml
    --cov-config=.coveragerc

# Coverage thresholds
cov-fail-under = 70

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    epic1: Epic 1 Multi-Model System tests
    epic8: Epic 8 Cloud-Native Microservices tests
    epic2: Epic 2 Advanced Retrieval tests
    smoke: Quick smoke tests
    slow: Slow running tests
    api: Tests requiring external API calls
    real_api: Tests using real API endpoints (not mocks)
    phase2: Epic 1 Phase 2 multi-model tests
    ml: Machine learning component tests
    infrastructure: Infrastructure and deployment tests
    performance: Performance and benchmark tests
    regression: Regression and bug fix validation tests

# Test execution settings
timeout = 600
timeout_method = thread

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:faiss.*
    ignore::pytest.PytestUnknownMarkWarning
    ignore::PydanticDeprecatedSince20:.*
    ignore::RuntimeWarning:.*redis_integration_config.*

# Logging configuration for tests
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S