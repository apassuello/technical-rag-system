# Monitoring Stack Network Policy
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: epic8-monitoring-policy
  labels:
    epic8.platform/component: monitoring
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Network policy for monitoring stack - allows scraping all services"
spec:
  podSelector:
    matchLabels:
      epic8.platform/component: monitoring
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from external monitoring access
  - from: []
    ports:
    - protocol: TCP
      port: 3000  # Grafana
    - protocol: TCP
      port: 9090  # Prometheus
  egress:
  # Allow egress to scrape all Epic 8 services
  - to:
    - podSelector:
        matchLabels:
          epic8.platform/version: v1
    ports:
    - protocol: TCP
      port: 9090  # Metrics endpoints
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53

# Cross-namespace communication policy (for multi-environment setups)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: epic8-cross-namespace-monitoring
  labels:
    epic8.platform/component: network-policy
    epic8.platform/policy-type: cross-namespace
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Allow monitoring stack to access services across namespaces"
spec:
  podSelector:
    matchLabels:
      epic8.platform/version: v1
  policyTypes:
  - Ingress
  ingress:
  # Allow monitoring from other namespaces
  - from:
    - namespaceSelector:
        matchLabels:
          name: epic8-monitoring
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 9090