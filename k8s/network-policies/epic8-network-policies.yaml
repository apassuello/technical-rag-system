# Default Deny All Network Policy
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: epic8-default-deny-all
  labels:
    epic8.platform/component: network-policy
    epic8.platform/policy-type: default-deny
    epic8.platform/version: v1
    app.kubernetes.io/name: epic8-platform
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: network-security
  annotations:
    epic8.platform/description: "Default deny all ingress and egress traffic for Epic 8 namespace"
spec:
  podSelector: {}  # Apply to all pods in namespace
  policyTypes:
  - Ingress
  - Egress

# API Gateway Network Policy
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: epic8-api-gateway-policy
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: network-policy
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Network policy for API Gateway - allows external ingress and backend egress"
spec:
  podSelector:
    matchLabels:
      epic8.platform/service: api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from anywhere (external traffic)
  - from: []
    ports:
    - protocol: TCP
      port: 8080
  # Allow ingress from monitoring (Prometheus scraping)
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # Allow egress to all backend services
  - to:
    - podSelector:
        matchLabels:
          epic8.platform/tier: backend
    ports:
    - protocol: TCP
      port: 8081  # Generator
    - protocol: TCP
      port: 8082  # Query Analyzer
    - protocol: TCP
      port: 8083  # Retriever
  # Allow egress to data tier services
  - to:
    - podSelector:
        matchLabels:
          epic8.platform/tier: data
    ports:
    - protocol: TCP
      port: 8084  # Cache
    - protocol: TCP
      port: 8085  # Analytics
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS egress for external APIs
  - to: []
    ports:
    - protocol: TCP
      port: 443

