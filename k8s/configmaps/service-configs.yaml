---
apiVersion: v1
kind: ConfigMap
metadata:
  name: query-analyzer-config
  labels:
    epic8.platform/service: query-analyzer
    epic8.platform/component: config
    epic8.platform/config-type: service
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Query Analyzer Service specific configuration"
data:
  # ML Model Configuration
  MODEL_NAME: "query-complexity-classifier"
  MODEL_VERSION: "1.0.0"
  MODEL_PATH: "/app/models"
  MODEL_CACHE_SIZE: "512"

  # Analysis Settings
  COMPLEXITY_THRESHOLD_SIMPLE: "0.3"
  COMPLEXITY_THRESHOLD_MODERATE: "0.7"
  FEATURE_EXTRACTION_ENABLED: "true"

  # Performance Settings
  BATCH_SIZE: "32"
  MAX_SEQUENCE_LENGTH: "512"
  INFERENCE_TIMEOUT: "5"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: generator-config
  labels:
    epic8.platform/service: generator
    epic8.platform/component: config
    epic8.platform/config-type: service
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Generator Service specific configuration"
data:
  # Model Selection Strategy
  MODEL_SELECTION_STRATEGY: "cost_optimized"
  FALLBACK_MODEL: "ollama"

  # Model Configuration
  OLLAMA_MODEL: "llama3.2:3b"
  OPENAI_MODEL: "gpt-4o-mini"
  MISTRAL_MODEL: "mistral-7b-instruct"
  ANTHROPIC_MODEL: "claude-3-haiku-20240307"

  # Generation Settings
  MAX_TOKENS: "2048"
  TEMPERATURE: "0.1"
  TOP_P: "0.9"
  GENERATION_TIMEOUT: "30"

  # Cost Tracking
  COST_TRACKING_ENABLED: "true"
  COST_PRECISION: "0.001"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: retriever-config
  labels:
    epic8.platform/service: retriever
    epic8.platform/component: config
    epic8.platform/config-type: service
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Retriever Service specific configuration"
data:
  # Retrieval Configuration
  RETRIEVAL_METHOD: "modular_unified"
  MAX_DOCUMENTS: "10"
  SIMILARITY_THRESHOLD: "0.7"

  # Vector Database Settings
  VECTOR_DIMENSION: "384"
  INDEX_TYPE: "HNSW"
  DISTANCE_METRIC: "cosine"

  # Epic 2 Integration
  EPIC2_INTEGRATION_ENABLED: "true"
  FAISS_INDEX_PATH: "/app/vector-indices"
  BM25_INDEX_PATH: "/app/vector-indices/bm25"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-config
  labels:
    epic8.platform/service: cache
    epic8.platform/component: config
    epic8.platform/config-type: service
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Cache Service specific configuration"
data:
  # Redis Configuration
  REDIS_DB: "0"
  REDIS_TIMEOUT: "5"
  REDIS_MAX_CONNECTIONS: "50"

  # Cache Strategy
  CACHE_STRATEGY: "lru"
  DEFAULT_TTL: "3600"
  MAX_MEMORY_POLICY: "allkeys-lru"

  # Cache Warming
  CACHE_WARMING_ENABLED: "true"
  CACHE_WARMING_QUERIES: "10"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-config
  labels:
    epic8.platform/service: analytics
    epic8.platform/component: config
    epic8.platform/config-type: service
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Analytics Service specific configuration"
data:
  # Analytics Configuration
  ANALYTICS_BATCH_SIZE: "100"
  ANALYTICS_FLUSH_INTERVAL: "60"
  ANALYTICS_RETENTION_DAYS: "90"

  # Cost Tracking
  COST_TRACKING_PRECISION: "0.001"
  COST_CURRENCY: "USD"
  COST_AGGREGATION_INTERVAL: "3600"

  # Performance Tracking
  PERFORMANCE_TRACKING_ENABLED: "true"
  PERFORMANCE_METRICS_INTERVAL: "30"
  SLA_TARGET_P95: "2000"  # 2 seconds in milliseconds

  # A/B Testing
  AB_TESTING_ENABLED: "false"
  AB_TESTING_TRAFFIC_SPLIT: "0.1"