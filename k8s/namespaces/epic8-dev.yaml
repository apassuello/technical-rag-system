---
apiVersion: v1
kind: Namespace
metadata:
  name: epic8-dev
  labels:
    epic8.platform/environment: dev
    epic8.platform/project: technical-rag
    epic8.platform/version: v1
    kubernetes.io/managed-by: epic8-platform
  annotations:
    epic8.platform/description: "Epic 8 Development Environment - Cloud-Native Multi-Model RAG Platform"
    epic8.platform/created-by: "kubernetes-architect"
    epic8.platform/documentation: "https://github.com/epic8/docs/environments/dev"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: epic8-dev-quota
  namespace: epic8-dev
  labels:
    epic8.platform/environment: dev
    epic8.platform/component: resource-quota
spec:
  hard:
    # Compute Resources
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi

    # Storage Resources
    requests.storage: 50Gi
    persistentvolumeclaims: "10"

    # Object Counts
    pods: "50"
    services: "20"
    secrets: "20"
    configmaps: "20"
    replicationcontrollers: "10"
    deployments.apps: "10"
    statefulsets.apps: "5"

    # Network Resources
    count/ingresses.networking.k8s.io: "5"
    services.loadbalancers: "2"
    services.nodeports: "0"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: epic8-dev-limits
  namespace: epic8-dev
  labels:
    epic8.platform/environment: dev
    epic8.platform/component: limit-range
spec:
  limits:
  # Pod limits
  - type: Pod
    max:
      cpu: "2"
      memory: 4Gi
    min:
      cpu: 50m
      memory: 64Mi
  # Container limits
  - type: Container
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    max:
      cpu: "1"
      memory: 2Gi
    min:
      cpu: 50m
      memory: 64Mi
  # PVC limits
  - type: PersistentVolumeClaim
    max:
      storage: 10Gi
    min:
      storage: 1Gi