---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-logs
  namespace: epic8-dev
  labels:
    epic8.platform/service: analytics
    epic8.platform/component: storage
    epic8.platform/storage-type: logs
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Persistent storage for Analytics logs (reduced for Kind)"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: epic8-kind-standard
  resources:
    requests:
      storage: 9Gi  # Reduced from 10Gi to make room for vector indices