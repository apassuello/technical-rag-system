# Shared Document Data Storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: epic8-document-data
  labels:
    epic8.platform/component: storage
    epic8.platform/storage-type: documents
    epic8.platform/version: v1
    app.kubernetes.io/name: epic8-platform
    app.kubernetes.io/part-of: epic8-platform
  annotations:
    epic8.platform/description: "Shared persistent storage for document data"
spec:
  accessModes:
    - ReadWriteMany  # Shared across multiple pods
  storageClassName: epic8-standard
  resources:
    requests:
      storage: 200Gi

