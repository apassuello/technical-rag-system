# Query Analyzer Storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: query-analyzer-logs
  labels:
    epic8.platform/service: query-analyzer
    epic8.platform/component: storage
    epic8.platform/storage-type: logs
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Persistent storage for Query Analyzer logs"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: epic8-standard
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: query-analyzer-cache
  labels:
    epic8.platform/service: query-analyzer
    epic8.platform/component: storage
    epic8.platform/storage-type: cache
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Persistent storage for Query Analyzer cache"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: epic8-fast-ssd
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: query-analyzer-models
  labels:
    epic8.platform/service: query-analyzer
    epic8.platform/component: storage
    epic8.platform/storage-type: models
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Persistent storage for Query Analyzer ML models"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: epic8-fast-ssd
  resources:
    requests:
      storage: 20Gi

