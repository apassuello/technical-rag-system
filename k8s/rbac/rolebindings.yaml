---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: epic8-cluster-reader-binding
  labels:
    epic8.platform/component: rbac
    epic8.platform/version: v1
    app.kubernetes.io/name: epic8-platform
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: rbac
  annotations:
    epic8.platform/description: "Cluster-level role binding for Epic 8 platform"
subjects:
# Analytics service needs cluster-level access for cost tracking
- kind: ServiceAccount
  name: epic8-analytics
  namespace: epic8-prod
- kind: ServiceAccount
  name: epic8-analytics
  namespace: epic8-staging
- kind: ServiceAccount
  name: epic8-analytics
  namespace: epic8-dev

# Monitoring service needs cluster-level access
- kind: ServiceAccount
  name: epic8-monitoring
  namespace: epic8-prod
- kind: ServiceAccount
  name: epic8-monitoring
  namespace: epic8-staging
- kind: ServiceAccount
  name: epic8-monitoring
  namespace: epic8-dev

roleRef:
  kind: ClusterRole
  name: epic8-cluster-reader
  apiGroup: rbac.authorization.k8s.io