---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: epic8-api-gateway-binding
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: rbac
    epic8.platform/version: v1
  annotations:
    epic8.platform/description: "Role binding for API Gateway service"
subjects:
- kind: ServiceAccount
  name: epic8-api-gateway
  namespace: "" # Will be set by the namespace where this is applied
roleRef:
  kind: Role
  name: epic8-api-gateway-role
  apiGroup: rbac.authorization.k8s.io

