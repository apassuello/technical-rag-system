---
# Epic 8 Service Monitors for comprehensive metrics collection
# Optimized for auto-scaling metrics and SLO monitoring

# API Gateway ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-metrics
  namespace: epic8-prod
  labels:
    epic8.platform/service: api-gateway
    epic8.platform/component: monitoring
    epic8.platform/tier: frontend
    app.kubernetes.io/name: api-gateway-monitor
    app.kubernetes.io/part-of: epic8-platform
spec:
  selector:
    matchLabels:
      epic8.platform/service: api-gateway
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
    honorLabels: true
    scrapeTimeout: 10s
    metricRelabelings:
    # HPA metrics
    - sourceLabels: [__name__]
      regex: 'http_requests_total'
      targetLabel: __name__
      replacement: 'epic8_api_gateway_requests_per_second'
    - sourceLabels: [__name__]
      regex: 'http_request_duration_seconds'
      targetLabel: __name__
      replacement: 'epic8_api_gateway_request_duration_seconds'
    - sourceLabels: [__name__]
      regex: 'active_connections'
      targetLabel: __name__
      replacement: 'epic8_api_gateway_active_connections'
    # SLO metrics
    - sourceLabels: [__name__]
      regex: 'http_requests_total'
      targetLabel: __name__
      replacement: 'epic8_api_gateway_requests_total'
  namespaceSelector:
    matchNames:
    - epic8-prod

---
# Generator ServiceMonitor (ML-optimized)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: generator-metrics
  namespace: epic8-prod
  labels:
    epic8.platform/service: generator
    epic8.platform/component: monitoring
    epic8.platform/tier: compute
    epic8.platform/workload-type: ml-inference
spec:
  selector:
    matchLabels:
      epic8.platform/service: generator
  endpoints:
  - port: metrics
    interval: 30s  # Longer interval for ML metrics
    path: /metrics
    honorLabels: true
    scrapeTimeout: 15s
    metricRelabelings:
    # HPA metrics for ML workloads
    - sourceLabels: [__name__]
      regex: 'generation_requests_queued'
      targetLabel: __name__
      replacement: 'epic8_generator_queue_length'
    - sourceLabels: [__name__]
      regex: 'generation_duration_seconds'
      targetLabel: __name__
      replacement: 'epic8_generator_generation_duration_seconds'
    - sourceLabels: [__name__]
      regex: 'model_switching_duration_ms'
      targetLabel: __name__
      replacement: 'epic8_generator_model_switching_overhead_ms'
    - sourceLabels: [__name__]
      regex: 'cost_per_query_usd'
      targetLabel: __name__
      replacement: 'epic8_generator_cost_per_query_usd'
    # SLO metrics
    - sourceLabels: [__name__]
      regex: 'generation_success_rate'
      targetLabel: __name__
      replacement: 'epic8_generator_success_rate'

