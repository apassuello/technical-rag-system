    epic8.platform/component: system-monitoring
    epic8.platform/tier: infrastructure
spec:
  selector:
    matchLabels:
      epic8.platform/monitoring: system
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    honorLabels: true
    metricRelabelings:
    # System-wide SLO metrics
    - sourceLabels: [__name__]
      regex: 'end_to_end_duration_seconds'
      targetLabel: __name__
      replacement: 'epic8_system_end_to_end_duration_seconds'
    - sourceLabels: [__name__]
      regex: 'cluster_cpu_utilization'
      targetLabel: __name__
      replacement: 'epic8_cluster_cpu_utilization'
    - sourceLabels: [__name__]
      regex: 'cluster_memory_utilization'
      targetLabel: __name__
      replacement: 'epic8_cluster_memory_utilization'
    - sourceLabels: [__name__]
      regex: 'concurrent_users'
      targetLabel: __name__
      replacement: 'epic8_system_concurrent_users'

---
# Autoscaling-specific ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: epic8-autoscaling-metrics
  namespace: epic8-prod
  labels:
    epic8.platform/component: autoscaling-monitoring
    epic8.platform/tier: infrastructure
spec:
  selector:
    matchLabels:
      epic8.platform/component: autoscaling
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    honorLabels: true
    metricRelabelings:
    # HPA metrics
    - sourceLabels: [__name__]
      regex: 'kube_hpa_status_current_replicas'
      targetLabel: __name__
      replacement: 'epic8_hpa_current_replicas'
    - sourceLabels: [__name__]
      regex: 'kube_hpa_status_desired_replicas'
      targetLabel: __name__
      replacement: 'epic8_hpa_desired_replicas'
    - sourceLabels: [__name__]
      regex: 'kube_hpa_spec_target_metric'
      targetLabel: __name__
      replacement: 'epic8_hpa_target_metric'
    # VPA metrics
    - sourceLabels: [__name__]
      regex: 'kube_vpa_status_recommendation'
      targetLabel: __name__
      replacement: 'epic8_vpa_recommendation'
    # Cluster Autoscaler metrics
    - sourceLabels: [__name__]
      regex: 'cluster_autoscaler_nodes_count'
      targetLabel: __name__
      replacement: 'epic8_cluster_nodes_count'