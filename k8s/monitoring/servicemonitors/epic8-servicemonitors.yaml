    - sourceLabels: [__name__]
      regex: 'cache_active_connections'
      targetLabel: __name__
      replacement: 'epic8_cache_active_connections'
    # SLO metrics
    - sourceLabels: [__name__]
      regex: 'cache_hits_total'
      targetLabel: __name__
      replacement: 'epic8_cache_hits_total'
    - sourceLabels: [__name__]
      regex: 'cache_requests_total'
