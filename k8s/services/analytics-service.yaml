---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  labels:
    epic8.platform/service: analytics
    epic8.platform/component: analytics
    epic8.platform/tier: data
    epic8.platform/version: v1
    app.kubernetes.io/name: analytics
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: analytics
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "Analytics Service - Performance monitoring and cost tracking"
    epic8.platform/load-balancer: "internal"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8085"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8085
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    epic8.platform/service: analytics
    app.kubernetes.io/name: analytics
  sessionAffinity: None