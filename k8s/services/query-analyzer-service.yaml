---
apiVersion: v1
kind: Service
metadata:
  name: query-analyzer
  labels:
    epic8.platform/service: query-analyzer
    epic8.platform/component: analyzer
    epic8.platform/tier: backend
    epic8.platform/version: v1
    app.kubernetes.io/name: query-analyzer
    app.kubernetes.io/part-of: epic8-platform
    app.kubernetes.io/component: analyzer
    app.kubernetes.io/version: "1.0.0"
  annotations:
    epic8.platform/description: "Query Analyzer Service - ML-based query complexity analysis"
    epic8.platform/load-balancer: "internal"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8082"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8082
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    epic8.platform/service: query-analyzer
    app.kubernetes.io/name: query-analyzer
  sessionAffinity: None