name: Helm Chart Testing Pipeline
# Specialized pipeline for Helm chart testing and validation
# Focuses on chart quality, security, and multi-environment compatibility

on:
  push:
    branches: [ main, develop, epic8* ]
    paths:
      - 'helm/**'
      - '.github/workflows/helm-testing.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'helm/**'
  workflow_dispatch:
    inputs:
      chart_name:
        description: 'Specific chart to test (leave empty for all)'
        required: false
        type: string
      environment:
        description: 'Environment to test'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'development'
          - 'staging'
          - 'production'

env:
  CHART_TESTING_VERSION: v3.9.0
  KUBERNETES_VERSION: v1.28.0

jobs:
  # Job 1: Chart Linting and Validation
  chart-linting:
    name: 📋 Chart Linting & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Set up chart-testing
      uses: helm/chart-testing-action@v2.6.0
      with:
        version: ${{ env.CHART_TESTING_VERSION }}

    - name: Add Helm repositories
      run: |
        echo "📦 Adding required Helm repositories..."
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo update

    - name: List changed charts
      id: list-changed
      run: |
        changed=$(ct list-changed --chart-dirs helm/charts --target-branch ${{ github.event.repository.default_branch }})
        if [[ -n "$changed" ]]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "charts<<EOF" >> $GITHUB_OUTPUT
          echo "$changed" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Lint all charts
      run: |
        echo "🔍 Linting Helm charts..."
        if [ -d "helm/charts" ]; then
          # Lint specific chart if provided
          if [ -n "${{ github.event.inputs.chart_name }}" ]; then
            chart_path="helm/charts/${{ github.event.inputs.chart_name }}"
            if [ -d "$chart_path" ]; then
              echo "Linting specific chart: ${{ github.event.inputs.chart_name }}"
              helm lint "$chart_path"
            else
              echo "❌ Chart ${{ github.event.inputs.chart_name }} not found"
              exit 1
            fi
          else
            # Lint all charts
            for chart in helm/charts/*/; do
              if [ -f "$chart/Chart.yaml" ]; then
                echo "Linting chart: $(basename $chart)"
                helm lint "$chart"
              fi
            done
          fi
        else
          echo "⚠️ No helm/charts directory found"
        fi

    - name: Lint changed charts with chart-testing
      if: steps.list-changed.outputs.changed == 'true'
      run: |
        echo "🔍 Linting changed charts with chart-testing..."
        ct lint --chart-dirs helm/charts --target-branch ${{ github.event.repository.default_branch }}

    - name: Run custom Helm chart tests
      run: |
        echo "🧪 Running custom Helm chart validation tests..."
        if [ -f "helm/tests/test_helm_charts.py" ]; then
          python -m pip install --upgrade pip
          pip install pyyaml pytest
          cd helm/tests
          python -m pytest test_helm_charts.py -v --tb=short
        else
          echo "⚠️ Custom Helm chart tests not found"
        fi

  # Job 2: Template Rendering Tests
  template-rendering:
    name: 🎨 Template Rendering Tests
    runs-on: ubuntu-latest
    needs: chart-linting
    timeout-minutes: 15

    strategy:
      matrix:
        environment: [development, staging, production]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Test template rendering
      run: |
        echo "🎨 Testing template rendering for ${{ matrix.environment }}..."

        if [ -d "helm/charts" ]; then
          for chart in helm/charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              chart_name=$(basename "$chart")
              echo "Testing chart: $chart_name"

              # Test with default values
              echo "  Testing with default values..."
              helm template test-release "$chart" > /tmp/rendered-default.yaml

              # Validate rendered YAML
              python3 -c "
              import yaml
              with open('/tmp/rendered-default.yaml', 'r') as f:
                  list(yaml.safe_load_all(f))
              print('✅ Default template rendering valid')
              "

              # Test with environment-specific values if they exist
              env_values="$chart/values-${{ matrix.environment }}.yaml"
              if [ -f "$env_values" ]; then
                echo "  Testing with ${{ matrix.environment }} values..."
                helm template test-release "$chart" -f "$env_values" > /tmp/rendered-env.yaml

                # Validate rendered YAML
                python3 -c "
                import yaml
                with open('/tmp/rendered-env.yaml', 'r') as f:
                    list(yaml.safe_load_all(f))
                print('✅ ${{ matrix.environment }} template rendering valid')
                "
              else
                echo "  No environment-specific values found for ${{ matrix.environment }}"
              fi
            fi
          done
        else
          echo "⚠️ No helm/charts directory found"
        fi

    - name: Generate test matrix for Epic 8
      id: generate-matrix
      run: |
        echo "🧩 Generating test matrix for Epic 8 services..."

        # Define Epic 8 services and their configurations
        cat > /tmp/test-matrix.json << 'EOF'
        {
          "include": [
            {
              "service": "api-gateway",
              "port": 8080,
              "replicas": 2
            },
            {
              "service": "query-analyzer",
              "port": 8082,
              "replicas": 1
            },
            {
              "service": "generator",
              "port": 8081,
              "replicas": 2
            },
            {
              "service": "retriever",
              "port": 8083,
              "replicas": 1
            },
            {
              "service": "cache",
              "port": 8084,
              "replicas": 1
            },
            {
              "service": "analytics",
              "port": 8085,
              "replicas": 1
            }
          ]
        }
        EOF

        echo "matrix=$(cat /tmp/test-matrix.json | jq -c .)" >> $GITHUB_OUTPUT

    - name: Test Epic 8 service configurations
      run: |
        echo "🔧 Testing Epic 8 service configurations..."

        # Test with different replica counts and configurations
        services='["api-gateway", "query-analyzer", "generator", "retriever", "cache", "analytics"]'

        for service in $(echo $services | jq -r '.[]'); do
          chart_path="helm/charts/epic8-$service"
          if [ -d "$chart_path" ]; then
            echo "Testing $service with custom values..."

            # Create custom values for testing
            cat > /tmp/test-values.yaml << EOF
        replicaCount: 2
        image:
          tag: "test-tag"
        service:
          port: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        EOF

            # Test rendering with custom values
            helm template test-$service "$chart_path" -f /tmp/test-values.yaml > /tmp/rendered-$service.yaml

            # Validate specific service requirements
            echo "  Validating $service specific requirements..."
            python3 -c "
            import yaml
            with open('/tmp/rendered-$service.yaml', 'r') as f:
                docs = list(yaml.safe_load_all(f))

            # Check for required Kubernetes resources
            resource_types = [doc.get('kind') for doc in docs if doc]
            required = ['Deployment', 'Service']
            for req in required:
                if req not in resource_types:
                    raise Exception(f'Required resource {req} not found for $service')

            print(f'✅ $service service requirements validated')
            "
          else
            echo "  Chart for $service not found, skipping..."
          fi
        done

  # Job 3: Kubernetes Integration Testing
  k8s-integration:
    name: ⚙️ Kubernetes Integration Testing
    runs-on: ubuntu-latest
    needs: [chart-linting, template-rendering]
    timeout-minutes: 25

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Set up chart-testing
      uses: helm/chart-testing-action@v2.6.0
      with:
        version: ${{ env.CHART_TESTING_VERSION }}

    - name: Create Kind cluster
      uses: helm/kind-action@v1.8.0
      with:
        cluster_name: helm-testing
        version: v0.20.0
        kubectl_version: ${{ env.KUBERNETES_VERSION }}
        config: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
          - role: worker
          - role: worker

    - name: Wait for cluster ready
      run: |
        echo "⏳ Waiting for cluster to be ready..."
        kubectl wait --for=condition=Ready nodes --all --timeout=300s
        kubectl cluster-info

    - name: Install and test changed charts
      run: |
        echo "🧪 Installing and testing charts in Kubernetes..."

        # Check if we have any charts to test
        if [ -d "helm/charts" ]; then
          # Get list of charts
          charts=$(find helm/charts -name "Chart.yaml" -exec dirname {} \;)

          for chart in $charts; do
            chart_name=$(basename "$chart")
            echo "Installing chart: $chart_name"

            # Create namespace for the chart
            kubectl create namespace "test-$chart_name" || true

            # Install chart
            helm install "test-$chart_name" "$chart" \
              --namespace "test-$chart_name" \
              --timeout=10m \
              --wait || {
              echo "❌ Failed to install $chart_name"

              # Debug information
              echo "Debug information for $chart_name:"
              kubectl get all -n "test-$chart_name"
              kubectl describe pods -n "test-$chart_name"

              continue
            }

            # Test the installation
            echo "✅ Chart $chart_name installed successfully"

            # Basic health check
            kubectl get all -n "test-$chart_name"

            # Wait for pods to be ready
            kubectl wait --for=condition=Ready pods --all \
              -n "test-$chart_name" --timeout=300s || {
              echo "⚠️ Some pods in $chart_name not ready"
              kubectl describe pods -n "test-$chart_name"
            }

            # Test with different values
            echo "Testing $chart_name with custom values..."

            # Create test values
            cat > /tmp/test-values.yaml << EOF
        # Test values for $chart_name
        replicaCount: 1
        image:
          tag: "latest"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        EOF

            # Upgrade with test values
            helm upgrade "test-$chart_name" "$chart" \
              --namespace "test-$chart_name" \
              -f /tmp/test-values.yaml \
              --timeout=5m || {
              echo "❌ Failed to upgrade $chart_name with test values"
              continue
            }

            echo "✅ Chart $chart_name upgraded successfully"

            # Cleanup
            helm uninstall "test-$chart_name" -n "test-$chart_name"
            kubectl delete namespace "test-$chart_name"
          done
        else
          echo "⚠️ No helm/charts directory found"
        fi

  # Job 4: Security and Best Practices
  security-validation:
    name: 🔒 Security & Best Practices
    runs-on: ubuntu-latest
    needs: chart-linting
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Install security tools
      run: |
        # Install Checkov for security scanning
        pip install checkov

        # Install kubesec
        wget https://github.com/controlplaneio/kubesec/releases/latest/download/kubesec_linux_amd64.tar.gz
        tar -xzf kubesec_linux_amd64.tar.gz
        sudo mv kubesec /usr/local/bin/

    - name: Security scan with Checkov
      run: |
        echo "🔍 Running security scan with Checkov..."
        if [ -d "helm/charts" ]; then
          checkov -d helm/charts --framework helm --output cli || {
            echo "⚠️ Security issues found, but continuing..."
          }
        fi

    - name: Validate security policies
      run: |
        echo "🔒 Validating security policies in Helm charts..."

        if [ -d "helm/charts" ]; then
          for chart in helm/charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              chart_name=$(basename "$chart")
              echo "Checking security for chart: $chart_name"

              # Render templates
              helm template security-test "$chart" > /tmp/rendered-$chart_name.yaml

              # Check with kubesec
              kubesec scan /tmp/rendered-$chart_name.yaml || {
                echo "⚠️ Security issues found in $chart_name"
              }

              # Custom security checks
              python3 << EOF
        import yaml

        with open('/tmp/rendered-$chart_name.yaml', 'r') as f:
            docs = list(yaml.safe_load_all(f))

        security_issues = []

        for doc in docs:
            if not doc:
                continue

            kind = doc.get('kind', '')

            if kind in ['Deployment', 'StatefulSet', 'DaemonSet']:
                spec = doc.get('spec', {})
                template = spec.get('template', {})
                pod_spec = template.get('spec', {})

                # Check security context
                security_context = pod_spec.get('securityContext', {})
                if not security_context.get('runAsNonRoot'):
                    security_issues.append(f"Pod should run as non-root in {doc.get('metadata', {}).get('name', 'unknown')}")

                # Check containers
                containers = pod_spec.get('containers', [])
                for container in containers:
                    container_security = container.get('securityContext', {})
                    if container_security.get('privileged'):
                        security_issues.append(f"Container should not run privileged: {container.get('name', 'unknown')}")

                    if not container_security.get('readOnlyRootFilesystem'):
                        security_issues.append(f"Container should use read-only root filesystem: {container.get('name', 'unknown')}")

        if security_issues:
            print("⚠️ Security recommendations for $chart_name:")
            for issue in security_issues:
                print(f"  - {issue}")
        else:
            print(f"✅ No major security issues found in $chart_name")
        EOF
            fi
          done
        fi

  # Job 5: Documentation and Metadata Validation
  documentation-validation:
    name: 📚 Documentation & Metadata
    runs-on: ubuntu-latest
    needs: chart-linting
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate chart documentation
      run: |
        echo "📚 Validating chart documentation..."

        if [ -d "helm/charts" ]; then
          for chart in helm/charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              chart_name=$(basename "$chart")
              echo "Checking documentation for: $chart_name"

              # Check for README
              if [ -f "$chart/README.md" ]; then
                echo "✅ README.md found for $chart_name"
              else
                echo "⚠️ README.md missing for $chart_name"
              fi

              # Check for NOTES.txt
              if [ -f "$chart/templates/NOTES.txt" ]; then
                echo "✅ NOTES.txt found for $chart_name"
              else
                echo "⚠️ NOTES.txt missing for $chart_name"
              fi

              # Validate Chart.yaml metadata
              python3 << EOF
        import yaml

        with open('$chart/Chart.yaml', 'r') as f:
            chart_data = yaml.safe_load(f)

        required_fields = ['name', 'version', 'description', 'apiVersion']
        missing_fields = [field for field in required_fields if field not in chart_data]

        if missing_fields:
            print(f"❌ Missing required fields in Chart.yaml for $chart_name: {missing_fields}")
        else:
            print(f"✅ Chart.yaml metadata valid for $chart_name")

        # Check version format
        version = chart_data.get('version', '')
        if not version or len(version.split('.')) != 3:
            print(f"⚠️ Version should follow semver format (x.y.z) for $chart_name: {version}")
        else:
            print(f"✅ Version format valid for $chart_name: {version}")
        EOF
            fi
          done
        fi

  # Final job: Test Summary
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [chart-linting, template-rendering, k8s-integration, security-validation, documentation-validation]
    if: always()

    steps:
    - name: Generate test summary
      run: |
        echo "# Helm Chart Testing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

        if [ -n "${{ github.event.inputs.chart_name }}" ]; then
          echo "**Chart**: ${{ github.event.inputs.chart_name }}" >> $GITHUB_STEP_SUMMARY
        fi

        if [ -n "${{ github.event.inputs.environment }}" ]; then
          echo "**Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Test Stage | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Chart Linting | ${{ needs.chart-linting.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Template Rendering | ${{ needs.template-rendering.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| K8s Integration | ${{ needs.k8s-integration.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Validation | ${{ needs.security-validation.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Documentation | ${{ needs.documentation-validation.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Overall status
        if [ "${{ needs.chart-linting.result }}" = "success" ] && \
           [ "${{ needs.template-rendering.result }}" = "success" ] && \
           [ "${{ needs.k8s-integration.result }}" = "success" ]; then
          echo "✅ **All critical tests passed!** Charts are ready for deployment." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Some tests failed.** Please review the results above." >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Recommendations" >> $GITHUB_STEP_SUMMARY
        echo "- Review security scan results and address any high-priority issues" >> $GITHUB_STEP_SUMMARY
        echo "- Ensure all charts have proper documentation (README.md, NOTES.txt)" >> $GITHUB_STEP_SUMMARY
        echo "- Test charts in a staging environment before production deployment" >> $GITHUB_STEP_SUMMARY
        echo "- Consider using chart signing for enhanced security" >> $GITHUB_STEP_SUMMARY