name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit tests
        run: |
          pytest tests/unit \
            -m "not requires_ml and not requires_ollama and not requires_postgres and not requires_redis and not integration" \
            --override-ini="addopts=--strict-markers --strict-config --tb=short" \
            -x -q

      - name: Coverage
        run: |
          pytest tests/unit tests/integration tests/validation \
            -m "not requires_ml and not requires_ollama" \
            --tb=short --cov=src --cov-report=term-missing \
            -q
